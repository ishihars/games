<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けいさんクエスト 〜かずのもりの だいぼうけん〜</title>
<style>
:root{
  --sky:#FFF6E3; --leaf:#7BC47F; --deep:#2E6B34; --honey:#FFB03A;
  --berry:#E85D75; --wood:#8A5A33; --wood2:#B07B4A; --ink:#3A2E1F;
  --aqua:#CDEFF9; --sea:#1E6E8C; --coral:#FF8B6A; --paper:#FFFDF5;
  --ok:#3E9B4F; --shadow:0 6px 0 rgba(58,46,31,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI","Meiryo",sans-serif;
  background:var(--sky); color:var(--ink); overflow:hidden;
}
#stage{position:relative; width:1280px; height:800px; transform-origin:top left; background:var(--sky);}
.scr{position:absolute; inset:0; display:none; flex-direction:column; align-items:center;}
.scr.on{display:flex;}
button{font-family:inherit; color:var(--ink); cursor:pointer; border:3px solid var(--deep);
  border-radius:22px; background:var(--paper); box-shadow:var(--shadow); transition:transform .08s;}
button:active{transform:translateY(4px) scale(.97); box-shadow:0 2px 0 rgba(58,46,31,.18);}
button:focus-visible{outline:4px solid var(--honey); outline-offset:2px;}
.big-btn{font-size:34px; font-weight:700; padding:22px 56px; background:var(--honey);}
ruby rt{font-size:.45em;}

/* ===== 背景の森 ===== */
.forest-bg{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
.hill{position:absolute; bottom:-60px; border-radius:50%;}
.h1{left:-15%; width:70%; height:300px; background:#A6D8A0;}
.h2{right:-20%; width:80%; height:340px; background:#8FCB8B;}
.h3{left:20%; width:90%; height:240px; background:var(--leaf);}
.sun{position:absolute; top:46px; right:80px; width:110px; height:110px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #FFE28A, var(--honey)); box-shadow:0 0 60px #ffd76e;}
.sea-mode .h1{background:#9FDDE8;} .sea-mode .h2{background:#7FCEDF;} .sea-mode .h3{background:#5FBFD6;}
.sea-mode{background:var(--aqua);}
.tree{position:absolute; bottom:120px; font-size:70px; filter:drop-shadow(0 4px 0 rgba(0,0,0,.08));}
.mapstar{position:absolute; font-size:30px; animation:twinkle 2.2s infinite alternate;}
@keyframes twinkle{from{opacity:.4; transform:scale(.9);}to{opacity:1; transform:scale(1.15);}}

/* ===== タイトル ===== */
#scr-title{justify-content:center; gap:30px;}
.game-logo{font-size:84px; font-weight:900; color:var(--deep); text-shadow:5px 5px 0 #fff, 8px 8px 0 rgba(58,46,31,.15);
  letter-spacing:.04em; z-index:2; text-align:center; line-height:1.2;}
.game-logo small{display:block; font-size:30px; color:var(--wood); text-shadow:3px 3px 0 #fff;}
.title-crown{font-size:40px;}

/* ===== 学年選択 ===== */
#scr-grade{justify-content:center; gap:40px;}
.grade-row{display:flex; gap:60px; z-index:2;}
.grade-btn{width:400px; height:140px; font-size:44px; font-weight:800;}
.grade-btn .sub{display:block; font-size:22px; font-weight:600; color:var(--wood);}
.g1btn{background:#DFF3D8;} .g2btn{background:#D8EEF7;}

/* ===== 共通トップバー ===== */
.topbar{width:100%; display:flex; align-items:center; gap:14px; padding:12px 20px; z-index:5;}
.pill{background:var(--paper); border:3px solid var(--deep); border-radius:999px;
  padding:8px 18px; font-size:24px; font-weight:700; box-shadow:var(--shadow); display:flex; align-items:center; gap:8px;}
.icon-btn{width:64px; height:64px; font-size:30px; border-radius:50%; padding:0;}
.spacer{flex:1;}

/* ===== マップ ===== */
#map-wrap{width:1200px; flex:1; display:flex; flex-direction:column; justify-content:center; z-index:2;}
.map-row{display:flex; justify-content:space-between; align-items:center; margin:22px 0; position:relative;}
.map-row.rev{flex-direction:row-reverse;}
.node{width:172px; height:160px; overflow:hidden; border-radius:34px; border:4px solid var(--deep); background:var(--paper);
  display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative;
  box-shadow:var(--shadow); font-weight:700; cursor:pointer; transition:transform .1s;}
.node .nemoji{font-size:44px; line-height:1;}
.node .nname{font-size:15px; margin-top:2px; max-width:150px; text-align:center;}
.node .medal{position:absolute; top:-14px; right:-10px; font-size:28px;}
.node.cleared{background:#EAF7E2;}
.node.today{background:var(--honey); animation:bounce 1s infinite;}
.node.today::after{content:"きょうの ぼうけん!"; position:absolute; top:-40px; left:50%; transform:translateX(-50%);
  background:var(--berry); color:#fff; font-size:15px; padding:4px 12px; border-radius:999px; white-space:nowrap;}
.node.ribbon{opacity:.85; background:#F3E8FF; cursor:default;}
.node.ribbon::after{content:"あしたの おたのしみ 🎀"; position:absolute; top:-40px; left:50%; transform:translateX(-50%);
  background:#9C6ADE; color:#fff; font-size:14px; padding:4px 12px; border-radius:999px; white-space:nowrap;}
.node.locked{opacity:.45; filter:grayscale(.6); cursor:default;}
.node.hiddenboss{background:#3F2B56; color:#fff; border-color:#1F1233;}
.node.hiddenboss .nname{color:#fff;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.mascot-map{position:absolute; font-size:44px; top:-52px; left:50%; transform:translateX(-50%); z-index:3;}

/* ===== バトル ===== */
#scr-battle{background:transparent;}
.bt-top{width:100%; display:flex; gap:16px; padding:10px 20px; align-items:flex-start; z-index:4;}
.status-card{background:var(--paper); border:3px solid var(--deep); border-radius:18px; padding:8px 16px;
  box-shadow:var(--shadow); min-width:270px;}
.status-card .name{font-size:20px; font-weight:800;}
.bar{height:16px; border-radius:8px; background:#E8E0D0; border:2px solid var(--deep); overflow:hidden; margin-top:4px;}
.bar > div{height:100%; background:linear-gradient(90deg,#FFD766,var(--honey)); transition:width .4s;}
.hp-hearts{font-size:20px; letter-spacing:2px;}
.enemy-card{margin-left:auto; text-align:right;}
.bt-stage{width:100%; height:300px; position:relative; z-index:2;}
.actor{position:absolute; bottom:0; text-align:center; transition:transform .25s;}
.hero-spot{left:255px;}
.enemy-spot{right:205px;}
.enemy-emoji{font-size:120px; line-height:1; display:inline-block; filter:drop-shadow(0 8px 0 rgba(0,0,0,.1));}
.enemy-emoji.boss{font-size:170px;}
.otomo-emoji{font-size:64px; position:relative; display:inline-block;}
.cos{position:absolute; font-size:26px;}
.cos.hat{top:-20px; left:50%; transform:translateX(-50%);}
.cos.ribbon{bottom:-4px; right:-12px;}
.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-14px);}75%{transform:translateX(12px);}}
.dash{animation:dash .4s;}
@keyframes dash{0%{transform:translateX(0);}42%{transform:translateX(175px);}100%{transform:translateX(0);}}
.dmg-pop{position:absolute; font-size:52px; font-weight:900; color:var(--berry); text-shadow:3px 3px 0 #fff;
  animation:rise 1s forwards; pointer-events:none; z-index:9;}
@keyframes rise{from{opacity:1; transform:translateY(0) scale(.7);}30%{transform:scale(1.25);}to{opacity:0; transform:translateY(-90px) scale(1);}}
.defeat{animation:defeat .8s forwards;}
@keyframes defeat{to{transform:scale(.1) rotate(360deg); opacity:0;}}
.bubble{position:absolute; left:30px; top:-10px; max-width:330px; background:#fff; border:3px solid var(--deep);
  border-radius:20px; padding:10px 16px; font-size:21px; font-weight:700; z-index:6;}
.bubble::after{content:""; position:absolute; bottom:-14px; left:60px; border:8px solid transparent; border-top-color:var(--deep);}

.q-zone{width:100%; padding:0 30px; display:flex; align-items:center; justify-content:center; gap:20px; min-height:80px; z-index:3;}
.q-text{font-size:42px; font-weight:900; background:var(--paper); border:4px solid var(--deep); border-radius:22px;
  padding:8px 30px; box-shadow:var(--shadow); display:flex; align-items:center; gap:14px; max-width:900px; flex-wrap:wrap; justify-content:center;}
.q-text .qsmall{font-size:30px;}
.ans-slot{display:inline-block; min-width:86px; border-bottom:6px solid var(--berry); text-align:center; color:var(--berry);}
.shiki-slot{min-width:60px;}

.bt-bottom{width:100%; flex:1; display:flex; gap:14px; padding:4px 24px 10px; z-index:3;}
/* 木のおぼん(シグネチャ) */
.tray{flex:1; background:linear-gradient(180deg,var(--wood2),var(--wood)); border:5px solid #6B4423; border-radius:22px;
  padding:10px 16px; box-shadow:inset 0 6px 12px rgba(0,0,0,.25), var(--shadow); position:relative;}
.tray-label{position:absolute; top:-18px; left:22px; background:#6B4423; color:#FFEBC9; font-size:16px;
  padding:2px 14px; border-radius:999px;}
.tray-inner{display:flex; gap:22px; align-items:center; height:100%; flex-wrap:wrap;}
.tenframe{display:grid; grid-template-columns:repeat(5,46px); grid-template-rows:repeat(2,46px); gap:5px;
  background:#FFF8E8; padding:10px; border-radius:14px; border:3px solid #6B4423;}
.cell{border:2.5px dashed #C9A15F; border-radius:10px; display:flex; align-items:center; justify-content:center;}
.blk{width:34px; height:34px; border-radius:50%; background:radial-gradient(circle at 32% 30%,#8FD3FF,#2E86C1);
  border:2.5px solid #1B4F72; cursor:pointer; transition:transform .1s;}
.blk.g2{background:radial-gradient(circle at 32% 30%,#FFC48A,#E67E22); border-color:#935116;}
.blk.lit{box-shadow:0 0 0 5px var(--honey); transform:scale(1.15);}
.blk.ghost{opacity:0; transform:scale(.2);}
.blk-loose{display:flex; gap:8px; flex-wrap:wrap; max-width:240px;}
.tray-msg{color:#FFEBC9; font-size:19px; font-weight:700; width:100%;}
.cherry{display:flex; flex-direction:column; align-items:center; color:#FFEBC9; font-weight:800; font-size:26px;}
.cherry .split{display:flex; gap:26px; margin-top:6px;}
.cherry .cnode{background:#FFF8E8; color:var(--ink); border:3px solid #6B4423; border-radius:50%;
  width:64px; height:64px; display:flex; align-items:center; justify-content:center; font-size:28px;}
.cherry .cline{width:3px; height:18px; background:#FFEBC9;}
.bundle{display:inline-flex; flex-direction:column; gap:3px; background:#FFF3D1; padding:6px; border-radius:8px; border:3px solid #B8860B; margin:3px;}
.bundle i{width:34px; height:5px; background:#E67E22; border-radius:3px; display:block;}
.bundle.breaking{animation:bundlebreak .8s forwards;}
@keyframes bundlebreak{50%{transform:rotate(8deg) scale(1.1);}100%{transform:rotate(0);}}

/* 数字パッド */
.pad{width:410px; background:var(--paper); border:4px solid var(--deep); border-radius:22px; padding:8px;
  box-shadow:var(--shadow); display:flex; flex-direction:column; gap:6px;}
.pad-row{display:flex; gap:8px; justify-content:center;}
.key{width:88px; height:54px; font-size:31px; font-weight:800; border-radius:14px;}
.key.op{background:#EADFFB; display:none;}
.pad.shiki .key.op{display:block;}
.key.del{background:#FFE3DA; font-size:22px; width:112px;}
.key.go{background:var(--ok); color:#fff; font-size:27px; width:180px; border-color:#1F5D2A;}
.key:disabled{opacity:.4; cursor:default;}

/* 筆算 */
.hissan{background:var(--paper); border:4px solid var(--deep); border-radius:22px; padding:14px 26px;
  box-shadow:var(--shadow); font-size:44px; font-weight:900; display:inline-block;}
.h-grid{display:grid; grid-template-columns:repeat(4,72px); text-align:center; line-height:1.35;}
.h-op{color:var(--sea);}
.h-rule{grid-column:1/5; border-bottom:6px solid var(--ink); margin:4px 0 8px;}
.h-memo{font-size:22px; height:30px; color:var(--berry);}
.h-memo .memo-box{display:inline-block; min-width:34px; border:2.5px dashed var(--berry); border-radius:8px; cursor:pointer; min-height:30px;}
.h-memo .memo-box.blink{animation:blinkA 0.7s 4;}
.h-ans{border:3px dashed #B9AB90; border-radius:12px; min-height:64px; margin:2px; display:flex; align-items:center; justify-content:center;}
.h-ans.active{border-color:var(--berry); background:#FFF2F4; animation:blinkA 1.2s infinite;}
.h-ans.done{border-style:solid; border-color:var(--ok); background:#EFFAF0;}
.h-digit-top.slashed{position:relative; color:#B9AB90;}
.h-digit-top.slashed::before{content:""; position:absolute; left:12px; top:50%; width:44px; height:4px; background:var(--berry); transform:rotate(-25deg);}
.h-digit-top.slashed::after{content:attr(data-new); position:absolute; top:-26px; left:50%; transform:translateX(-50%); font-size:24px; color:var(--berry);}
@keyframes blinkA{0%,100%{box-shadow:0 0 0 0 rgba(232,93,117,0);}50%{box-shadow:0 0 0 6px rgba(232,93,117,.45);}}

/* 場面アニメ */
.scene{background:#FFFDF5; border:4px solid var(--deep); border-radius:22px; padding:10px 22px; box-shadow:var(--shadow);
  min-width:420px; max-width:760px; text-align:center;}
.scene-row{display:flex; gap:6px; justify-content:center; align-items:center; min-height:56px; flex-wrap:wrap;}
.scene-row .lbl{font-size:20px; font-weight:800; min-width:70px; text-align:left;}
.sitem{font-size:42px; display:inline-block; transition:opacity .5s, transform .6s;}
.sitem.enter{animation:popin .5s;}
.sitem.leave{opacity:.15; transform:translateY(-26px) scale(.8);}
.sitem.matched{opacity:.25;}
.sitem.hl{animation:blinkA 0.8s 3; border-radius:50%;}
.sitem.numbadge{position:relative;}
@keyframes popin{from{transform:scale(0);}70%{transform:scale(1.25);}to{transform:scale(1);}}
.tape{display:flex; flex-direction:column; gap:4px; align-items:flex-start; margin-top:6px;}
.tape > div{height:26px; border-radius:6px; border:2.5px solid var(--ink); display:flex;}
.tape .seg-a{background:#8FD3FF;} .tape .seg-b{background:#FFC48A;} .tape .seg-diff{background:var(--berry);}

/* 演出 */
.flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:50;}
.flash.go{animation:flashA .5s;}
@keyframes flashA{0%{opacity:0;}30%{opacity:.85;}100%{opacity:0;}}
.hanamaru{position:absolute; font-size:130px; z-index:40; animation:popin .5s; pointer-events:none;}
.confetti{position:absolute; width:14px; height:14px; z-index:60; animation:confA 1.6s forwards; pointer-events:none;}
@keyframes confA{from{transform:translateY(-40px) rotate(0);}to{transform:translateY(760px) rotate(720deg); opacity:.2;}}
.center-banner{position:absolute; top:36%; left:50%; transform:translate(-50%,-50%); z-index:55;
  background:var(--paper); border:5px solid var(--honey); border-radius:28px; padding:26px 60px; text-align:center;
  font-size:44px; font-weight:900; box-shadow:0 12px 0 rgba(58,46,31,.25); animation:popin .4s;}
.center-banner .sub{font-size:28px; color:var(--wood); margin-top:6px;}
.oshii{position:absolute; z-index:40; background:#fff; border:3px solid var(--wood); border-radius:999px;
  padding:8px 26px; font-size:28px; font-weight:800; animation:popin .3s; pointer-events:none;}

/* エリアクリア/ずかん/カレンダー */
#scr-clear{justify-content:center; gap:22px;}
.clear-card{background:var(--paper); border:5px solid var(--honey); border-radius:30px; padding:34px 70px;
  text-align:center; z-index:2; box-shadow:0 12px 0 rgba(58,46,31,.22);}
.clear-card .cmedal{font-size:90px;}
.clear-card h2{font-size:44px; margin:8px 0;}
.newfriend{font-size:110px; animation:popin .6s;}
.zukan-grid{display:grid; grid-template-columns:repeat(6,196px); gap:14px; z-index:2; margin-top:10px;}
.zcard{background:var(--paper); border:3.5px solid var(--deep); border-radius:20px; height:192px; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:var(--shadow); cursor:pointer;}
.zcard .zemoji{font-size:58px;}
.zcard.unknown .zemoji{filter:grayscale(1) brightness(.25);}
.zcard .zname{font-size:16px; font-weight:700; margin-top:4px;}
.zcard.gold{background:linear-gradient(160deg,#FFF3C4,#FFD766); border-color:#B8860B;}
.zcard.gold .zemoji{filter:sepia(1) saturate(3) hue-rotate(-15deg) brightness(1.15); text-shadow:0 0 18px #ffd700;}
.cal-grid{display:grid; grid-template-columns:repeat(7,120px); gap:10px; z-index:2;}
.cal-cell{background:var(--paper); border:3px solid var(--deep); border-radius:16px; height:86px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:700;}
.cal-cell .d{font-size:16px; color:var(--wood);}
.cal-cell .s{font-size:34px;}
.cal-cell.future{opacity:.4;}
.reward-list{display:flex; gap:12px; z-index:2; margin-top:14px; flex-wrap:wrap; justify-content:center; max-width:1100px;}
.rw{background:var(--paper); border:3px solid var(--deep); border-radius:16px; padding:8px 14px; font-size:19px; font-weight:700;}
.rw.locked{opacity:.45;}
.rw.got{background:#FFF3C4; border-color:#B8860B;}

/* 保護者 */
#scr-parent{background:#F4F1EA;}
.parent-body{width:1100px; flex:1; overflow-y:auto; background:#fff; border-radius:14px; margin:8px 0 20px;
  padding:26px 40px; font-size:17px; line-height:1.8; user-select:text; z-index:2; border:1px solid #ccc;}
.parent-body h3{border-bottom:2px solid var(--deep); padding-bottom:4px;}
.parent-body table{border-collapse:collapse; width:100%; margin:8px 0 18px;}
.parent-body th,.parent-body td{border:1px solid #bbb; padding:5px 10px; text-align:left; font-size:15px;}
.parent-body th{background:#EFEAE0;}

#scr-break{justify-content:center; gap:26px;}
.stretch{font-size:150px; animation:stretchA 1.4s infinite alternate; z-index:2;}
@keyframes stretchA{from{transform:rotate(-12deg) scale(1);}to{transform:rotate(12deg) scale(1.12);}}

.hero-svg{width:110px; height:130px; position:relative; display:inline-block;}
.hero-cos{position:absolute; font-size:34px; z-index:3;}
.hero-cos.hat{top:-24px; left:34px;} .hero-cos.crown{top:-28px; left:36px;}
.hero-cape{position:absolute; top:44px; left:-16px; width:44px; height:64px; z-index:0;
  background:linear-gradient(180deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF); border-radius:12px 4px 60% 20%; transform:rotate(14deg);}


/* ===== スプライト版キャラ・演出強化 ===== */
.enemy-img{width:auto;height:auto;max-width:440px;max-height:250px;filter:drop-shadow(0 8px 0 rgba(0,0,0,.12));transition:transform .2s;}
.enemy-img.boss{max-width:530px;max-height:285px;}
#hero-img{width:195px;filter:drop-shadow(0 6px 0 rgba(0,0,0,.10));}
.hero-wrap{position:relative;display:inline-block;}
.hero-wrap .hero-cos{left:50%;top:-6%;transform:translateX(-50%);}
.otomo-img{width:130px;}
.goldfx{filter:sepia(1) saturate(2.6) hue-rotate(-12deg) brightness(1.15) drop-shadow(0 0 10px #ffd700);}
.nimg{width:124px;height:93px;object-fit:contain;display:block;}
.zimg{width:168px;height:126px;object-fit:contain;display:block;}
.zcard.unknown .zimg{filter:grayscale(1) brightness(.15);}
.zcard.gold .zimg{filter:sepia(1) saturate(2.6) hue-rotate(-12deg) brightness(1.15) drop-shadow(0 0 10px #ffd700);}
.newfriend-img{width:260px;animation:popin .6s;}
#battle-bg{position:absolute;inset:0;z-index:0;pointer-events:none;}
.slash{position:absolute;z-index:9;pointer-events:none;animation:slashA .38s forwards;}
@keyframes slashA{from{opacity:0;transform:rotate(-30deg) scale(.35);}30%{opacity:1;}to{opacity:0;transform:rotate(14deg) scale(1.3);}}
.particle{position:absolute;width:13px;height:13px;border-radius:50%;z-index:9;pointer-events:none;animation:partA .65s forwards;}
@keyframes partA{from{opacity:1;transform:translate(0,0) scale(1.1);}to{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2);}}
.boss-overlay{position:absolute;inset:0;background:radial-gradient(circle at 70% 40%, rgba(60,20,80,.35), rgba(15,8,25,.72));z-index:44;pointer-events:none;animation:bossOv 2s forwards;}
@keyframes bossOv{0%{opacity:0;}25%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
.boss-enter{animation:bossIn 1.4s cubic-bezier(.2,.9,.3,1.25);}
@keyframes bossIn{0%{transform:scale(2.6) translateY(-140px);opacity:0;}45%{opacity:1;}70%{transform:scale(1.06) translateY(6px);}100%{transform:scale(1) translateY(0);}}
.rumble{animation:rumbleA .45s 2;}
@keyframes rumbleA{0%,100%{transform:translate(0,0);}20%{transform:translate(-9px,4px);}40%{transform:translate(7px,-6px);}60%{transform:translate(-6px,-4px);}80%{transform:translate(8px,3px);}}


.slash2{position:absolute;z-index:9;pointer-events:none;animation:slash2A .34s .08s forwards;opacity:0;}
@keyframes slash2A{from{opacity:0;transform:rotate(28deg) scaleX(-1) scale(.35);}30%{opacity:1;}to{opacity:0;transform:rotate(-10deg) scaleX(-1) scale(1.35);}}
.impact-ring{position:absolute;z-index:8;pointer-events:none;border:8px solid #FFD766;border-radius:50%;
  box-shadow:0 0 22px #FFB03A, inset 0 0 18px #fff;animation:ringA .42s ease-out forwards;}
@keyframes ringA{from{width:14px;height:14px;margin:-7px;opacity:1;}to{width:150px;height:150px;margin:-75px;opacity:0;}}
.burst{position:absolute;z-index:7;pointer-events:none;background:radial-gradient(circle,#FFF6C9 0%,#FFD766 35%,rgba(255,176,58,0) 70%);
  border-radius:50%;animation:burstA .3s ease-out forwards;}
@keyframes burstA{from{width:26px;height:26px;margin:-13px;opacity:.95;}to{width:130px;height:130px;margin:-65px;opacity:0;}}
.pstar{position:absolute;z-index:9;pointer-events:none;font-size:19px;animation:partA .7s forwards;text-shadow:0 0 8px #fff;}
.hitstop{animation:hitstopA .22s;}
@keyframes hitstopA{0%{transform:scale(1);}30%{transform:scale(1.22) rotate(-4deg);}60%{transform:scale(.94);}100%{transform:scale(1);}}
.kick{animation:kickA .22s;}
@keyframes kickA{0%,100%{transform:translate(0,0);}30%{transform:translate(-10px,5px);}60%{transform:translate(7px,-4px);}}
.flash.hit{animation:hitFlashA .16s;}
@keyframes hitFlashA{0%{opacity:0;}40%{opacity:.4;}100%{opacity:0;}}
.dmg-pop{font-size:50px !important;color:#fff !important;
  text-shadow:0 0 4px #E85D75,3px 3px 0 #E85D75,-3px 3px 0 #E85D75,3px -3px 0 #E85D75,-3px -3px 0 #E85D75,0 6px 0 rgba(58,46,31,.4) !important;}

/* ===== タイトルの恐竜集合 ===== */
.herd{position:relative; width:1240px; height:210px; z-index:2; overflow:visible;
  display:flex; align-items:flex-end; justify-content:center; gap:4px;}
.herd img{display:block; filter:drop-shadow(0 8px 0 rgba(0,0,0,.10)); transform-origin:bottom center;}
.herd .h-bob{animation:herdBob 1.1s ease-in-out infinite alternate;}
@keyframes herdBob{from{transform:translateY(0);}to{transform:translateY(-8px);}}


/* ===== ヒントバー ===== */
#hint-bar{position:relative; z-index:12; margin:0 auto 4px;
  max-width:1120px; min-height:58px; background:linear-gradient(180deg,#FFF9DC,#FFEFB0);
  border:5px solid var(--honey); border-radius:18px;
  padding:8px 22px; font-size:27px; font-weight:800; display:flex; align-items:center; gap:14px;
  box-shadow:0 6px 0 rgba(58,46,31,.18); animation:hintPop .45s;}
@keyframes hintPop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
#hint-bar .hbadge{background:var(--honey); color:#fff; border-radius:999px; padding:2px 16px; font-size:20px; white-space:nowrap;}
#hint-bar .hspk{width:52px; height:52px; font-size:24px; border-radius:50%; padding:0; flex:none;}
.tray.hl-tray{box-shadow:0 0 0 6px var(--honey), inset 0 6px 12px rgba(0,0,0,.25); }
.tray-point{position:absolute; top:-46px; left:50%; transform:translateX(-50%); font-size:40px;
  animation:pointDown .7s ease-in-out infinite alternate; z-index:13;}
@keyframes pointDown{from{transform:translateX(-50%) translateY(0);}to{transform:translateX(-50%) translateY(12px);}}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important;}
}
</style>
</head>
<body>
<div id="stage">
  <div class="forest-bg" id="bg">
    <div class="sun"></div>
    <div class="hill h1"></div><div class="hill h2"></div><div class="hill h3"></div>
    <div class="tree" style="left:60px">🌳</div><div class="tree" style="left:1120px">🌲</div>
    <div id="bg-stars"></div>
  </div>

  <!-- タイトル -->
  <div class="scr on" id="scr-title">
    <div class="game-logo">けいさんクエスト<small>〜きょうりゅうの もりの だいぼうけん〜</small></div>
    <div class="title-crown" id="title-crown" style="z-index:2"></div>
    <div id="title-herd" class="herd"></div>
    <button class="big-btn" id="btn-start">はじめる</button>
    <div class="pill" style="z-index:2; font-size:18px" id="title-hint">🔊 おとが でるよ</div>
  </div>

  <!-- 学年選択 -->
  <div class="scr" id="scr-grade">
    <div style="height:120px"></div>
    <div class="game-logo" style="font-size:44px">がくねんを えらんでね</div>
    <div style="height:30px"></div>
    <div class="grade-row">
      <button class="grade-btn g1btn" data-g="1">1ねんせい<span class="sub">きょうりゅうの もり 🦕</span></button>
      <button class="grade-btn g2btn" data-g="2">2ねんせい<span class="sub">きょうりゅうの うみ 🌊</span></button>
    </div>
  </div>

  <!-- マップ -->
  <div class="scr" id="scr-map">
    <div class="topbar">
      <div class="pill" id="map-world">🌳 かずのもり</div>
      <div class="pill" id="map-level">Lv1</div>
      <div class="pill" id="map-zukan-pill">なかま 0/14</div>
      <div class="pill" id="map-streak">☀️ 0にち</div>
      <div class="spacer"></div>
      <button class="icon-btn" id="btn-zukan" title="ずかん">📖</button>
      <button class="icon-btn" id="btn-cal" title="カレンダー">🗓️</button>
      <button class="icon-btn" id="btn-bgm" title="おんがく">🎵</button>
      <button class="icon-btn" id="btn-grade-back" title="がくねんへ">🏠</button>
    </div>
    <div id="map-wrap"></div>
    <div class="topbar" style="padding-bottom:18px">
      <div class="pill" id="map-msg" style="font-size:19px"></div>
      <div class="spacer"></div>
      <button style="font-size:15px; padding:8px 16px; opacity:.85" id="btn-parent">おうちのかたへ</button>
    </div>
  </div>

  <!-- バトル -->
  <div class="scr" id="scr-battle">
    <div id="battle-bg"></div>
    <div class="bt-top">
      <div class="status-card">
        <div class="name" id="pl-name">ゆうしゃ Lv1</div>
        <div class="hp-hearts" id="pl-hearts" style="display:none"></div>
        <div class="bar" title="けいけんち"><div id="pl-expbar" style="width:0%"></div></div>
        <div style="font-size:15px; color:var(--wood)" id="pl-atk">こうげき 3</div>
      </div>
      <div class="pill" id="bt-zukan">なかま 0/14</div>
      <div class="spacer"></div>
      <div class="status-card enemy-card">
        <div class="name" id="en-name">どんぐりん</div>
        <div class="hp-hearts" id="en-hearts">❤️❤️</div>
      </div>
      <button class="icon-btn" id="btn-bgm2" title="おんがく">🎵</button>
      <button class="icon-btn" id="btn-map-back" title="マップへ">🗺️</button>
    </div>
    <div class="bt-stage">
      <div class="bubble" id="mascot-bubble" style="display:none"></div>
          <div class="actor hero-spot" id="hero-actor"></div>
      <div class="actor enemy-spot" id="enemy-actor"><img class="enemy-img" id="enemy-emoji" alt=""></div>
    </div>
    <div class="q-zone" id="q-zone"></div>
    <div id="hint-bar" style="display:none"></div>
    <div class="bt-bottom">
      <div class="tray" id="tray">
        <div class="tray-label">🪵 かんがえる おぼん(さわって いいよ)</div>
        <div class="tray-inner" id="tray-inner"></div>
      </div>
      <div class="pad" id="pad">
        <div class="pad-row">
          <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key op" data-k="+">+</button>
        </div>
        <div class="pad-row">
          <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key op" data-k="-">−</button>
        </div>
        <div class="pad-row">
          <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
          <button class="key" data-k="0">0</button>
        </div>
        <div class="pad-row">
          <button class="key del" data-k="del">けす</button>
          <button class="key" data-k="spk" style="width:74px" title="もういちど きく">🔊</button>
          <button class="key go" data-k="go">こたえる</button>
        </div>
      </div>
    </div>
  </div>

  <!-- エリアクリア -->
  <div class="scr" id="scr-clear">
    <div class="clear-card" id="clear-card"></div>
    <div id="clear-btns" style="display:flex; gap:24px; z-index:2"></div>
  </div>

  <!-- ずかん -->
  <div class="scr" id="scr-zukan">
    <div class="topbar">
      <div class="pill" id="zukan-title">📖 なかまずかん</div>
      <div class="pill" id="zukan-count"></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="btn-zukan-back">↩️</button>
    </div>
    <div class="pill" id="goldpick-msg" style="display:none; z-index:2">✨ きんいろに したい なかまを えらんでね!</div>
    <div class="zukan-grid" id="zukan-grid"></div>
  </div>

  <!-- カレンダー -->
  <div class="scr" id="scr-cal">
    <div class="topbar">
      <div class="pill">🗓️ おひさまカレンダー</div>
      <div class="pill" id="cal-streak"></div>
      <div class="pill" id="cal-total"></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="btn-cal-back">↩️</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="reward-list" id="reward-list"></div>
  </div>

  <!-- 休憩 -->
  <div class="scr" id="scr-break">
    <div class="stretch" id="break-mascot">🐿️</div>
    <div class="game-logo" style="font-size:52px">きゅうけいしよう!<small>のびのび〜</small></div>
    <div class="pill" id="break-count" style="z-index:2; font-size:26px">30</div>
    <button class="big-btn" id="btn-break-done" style="display:none">カレンダーを みる</button>
  </div>

  <!-- 保護者向け -->
  <div class="scr" id="scr-parent">
    <div class="topbar">
      <div class="pill" style="font-size:19px">おうちのかたへ(学習サマリ)</div>
      <div class="spacer"></div>
      <button class="icon-btn" id="btn-parent-back">↩️</button>
    </div>
    <div class="parent-body" id="parent-body"></div>
  </div>

  <div class="flash" id="flash"></div>
</div>

let AC=null, bgmTimer=null, bgmOn=S.bgm!==false, masterG=null;
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();
  masterG=AC.createGain();masterG.gain.value=1;masterG.connect(AC.destination);}catch(e){AC=null;}}
function tone(f,t0,d,type="sine",g=0.14,slide=0){if(!AC)return;const o=AC.createOscillator(),v=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+d);
  v.gain.setValueAtTime(0.0001,t0);v.gain.exponentialRampToValueAtTime(g,t0+0.015);v.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  o.connect(v);v.connect(masterG);o.start(t0);o.stop(t0+d+0.05);}

function speak(text,cb){let done=false;const fire=()=>{if(done)return;done=true;cb&&cb();};
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text.replace(/□/g,"なに"));
  u.lang="ja-JP";u.rate=0.92;u.pitch=1.15;if(cb)u.onend=fire;speechSynthesis.speak(u);
  if(cb)setTimeout(fire,Math.min(9000,text.length*300+2200));}
  catch(e){if(cb)setTimeout(fire,800);}}

/* ================= 問題生成 ================= */
function counterForm(n,c){ // 助数詞の音便
  if(c==="ひき"){if([1,6,8,10].includes(n))return n+"ぴき";if(n===3)return "3びき";return n+"ひき";}
  if(c==="ほん"){if([1,6,8,10].includes(n))return n+"ぽん";if(n===3)return "3ぼん";return n+"ほん";}
  if(c==="わ"){return n+"わ";}
  return n+c;}
const SCENES=[
 {emoji:"🍎",name:"りんご",c:"こ"},{emoji:"🍬",name:"あめ",c:"こ"},{emoji:"🍪",name:"クッキー",c:"まい"},
 {emoji:"🌸",name:"はな",c:"ほん"},{emoji:"🐦",name:"ことり",c:"わ"},{emoji:"🐠",name:"きんぎょ",c:"ひき"},
 {emoji:"🎈",name:"ふうせん",c:"こ"},{emoji:"✏️",name:"えんぴつ",c:"ほん"}];
const PAIRS=[["🐱","ねこ","🐶","いぬ","ひき"],["✏️","えんぴつ","🖊️","ペン","ほん"],["🍎","りんご","🍊","みかん","こ"],["🍬","あめ","🍪","ガム","こ"]];

let lastPairs=[]; // 直近3問の数値ペア重複禁止
function fresh(a,b,make){let t=0;while(t++<30){const q=make();const key=q.a+"_"+(q.b??"")+"_"+q.sub;
  if(!lastPairs.includes(key)){lastPairs.push(key);if(lastPairs.length>3)lastPairs.shift();return q;}}return make();}

/* q: {sub, type:'num'|'shiki'|'two'|'hissan', disp, speech, ans, op, a,b,c, scene, tray, band} */
function Q(o){return Object.assign({type:"num"},o);}

function genTale(sub){ // 文章題
  if(sub==="awasete"){const s=pick(SCENES.slice(0,4));const a=rnd(2,6),b=rnd(2,Math.min(6,10-a));
    return Q({sub,a,b,op:"+",ans:a+b,scene:{kind:"merge",s,a,b},
      disp:`あわせて なん${s.c==="ほん"?"ぼん":s.c}?`,
      speech:`${s.name}が ${counterForm(a,s.c)}と、${counterForm(b,s.c)}。あわせて いくつかな?`});}
  if(sub==="fueru"){const useBus=Math.random()<0.4;
    if(useBus){const a=rnd(3,7),b=rnd(2,Math.min(5,12-a));return Q({sub,a,b,op:"+",ans:a+b,
      scene:{kind:"bus",a,b},disp:"みんなで なんにん?",
      speech:`バスに ${a}にん のっています。${b}にん のってきました。みんなで なんにんかな?`});}
    const s=pick(SCENES);const a=rnd(3,7),b=rnd(2,Math.min(5,12-a));
    return Q({sub,a,b,op:"+",ans:a+b,scene:{kind:"add",s,a,b},disp:`みんなで いくつ?`,
      speech:`${s.name}が ${counterForm(a,s.c)}。${counterForm(b,s.c)} ふえました。みんなで いくつかな?`});}
  if(sub==="nokori"){const s=pick(SCENES.slice(0,3));const a=rnd(5,10),b=rnd(2,a-1);
    return Q({sub,a,b,op:"-",ans:a-b,scene:{kind:"remove",s,a,b},disp:`のこりは いくつ?`,
      speech:`${s.name}が ${counterForm(a,s.c)}。${counterForm(b,s.c)} たべました。のこりは いくつかな?`});}
  if(sub==="chigaiPic"||sub==="chigai"){const p=pick(PAIRS);let a=rnd(3,7),b=rnd(3,9);
    while(a===b)b=rnd(3,9);
    return Q({sub,a,b,op:"diff",ans:Math.abs(a-b),scene:{kind:sub==="chigaiPic"?"pair11":"pairTape",p,a,b},
      disp:`ちがいは いくつ?`,
      speech:`${p[1]}が ${counterForm(a,p[4])}、${p[3]}が ${counterForm(b,p[4])}。ちがいは いくつかな?`});}
  if(sub==="dochira"){const p=pick(PAIRS);let a=rnd(3,7),b=rnd(3,9);while(a===b)b=rnd(3,9);
    return Q({sub,type:"two",a,b,op:"diff",ans:Math.abs(a-b),which:a>b?0:1,p,
      scene:{kind:"pair11",p,a,b},disp:`どちらが いくつ おおい?`,
      speech:`${p[1]}が ${counterForm(a,p[4])}、${p[3]}が ${counterForm(b,p[4])}。どちらが いくつ おおいかな?`});}
  if(sub==="shikiPlus"||sub==="shikiMinus"||sub==="shikiMix"){
    let plus=sub==="shikiPlus"||(sub==="shikiMix"&&Math.random()<0.5);
    const base=genTale(plus?(Math.random()<0.5?"awasete":"fueru"):"nokori");
    base.sub=sub;base.type="shiki";base.disp="しきを つくろう";
    base.speech+=" しきを つくって こたえよう。";return base;}
}

function gen2(area,forceSub){ // 2年(area:0始まり)

    return Q({sub:(op==="+"?"hAdd":"hSub"),type:"hissan",a,b,op,ans,

  const gens={
   b1:()=>{if(Math.random()<0.5){const base=rnd(6,9),b=rnd(11-base,9);
       return Q({sub:"carry",a:base,b,op:"+",ans:base+b,disp:`${base}+${b}`,speech:`${base} たす ${b}は?`,tray:{frame:base,loose:b}});}
     const a=rnd(11,18),b=rnd(a-9,9);
     return Q({sub:"borrow",a,b,op:"-",ans:a-b,disp:`${a}−${b}`,speech:`${a} ひく ${b}は?`,tray:{frame:10,loose:a-10,minus:b}});},
   b2:()=>{const r=Math.random();
     if(r<0.4){const a1=rnd(1,8),b1=rnd(1,9-a1),a10=rnd(1,7),b10=rnd(1,8-a10);return H(a10*10+a1,b10*10+b1,"+");}
     if(r<0.8){const b1=rnd(0,8),a1=rnd(b1+1,9),b10=rnd(1,7),a10=rnd(b10+1,8);
       let x=a10*10+a1,y=b10*10+b1;if(x-y<1)return gens.b2();return H(x,y,"-");}
     const a1=rnd(1,4),a10=rnd(1,8),d=rnd(1,9-a1);return H(a10*10+a1,d,"+");},
   b3:()=>{if(Math.random()<0.5){const a1=rnd(2,9),b1=rnd(11-a1,9),a10=rnd(1,7),b10=rnd(1,7-a10);
       return H(a10*10+a1,b10*10+b1,"+");}
     const a1=rnd(2,9),b1=rnd(11-a1,9);let a10=rnd(3,9),b10=rnd(Math.max(1,10-a10-1),9);
     if(a10+b10+1<10)return gens.b3();const s=(a10*10+a1)+(b10*10+b1);if(s>197)return gens.b3();

   b4:()=>{const r=Math.random();
     if(r<0.6){const b1=rnd(1,9),a1=rnd(0,b1-1),b10=rnd(1,7),a10=rnd(b10+1,8);
       const x=a10*10+a1,y=b10*10+b1;if(x-y<1)return gens.b4();return H(x,y,"-");}
     if(r<0.8){const b1=rnd(1,9),a1=rnd(0,b1-1),b10=rnd(1,8),a10=b10+1; // 十の位が0になる型
       const x=a10*10+a1,y=b10*10+b1;if(x-y<1)return gens.b4();return H(x,y,"-");}
     const a10=rnd(2,9),b1=rnd(1,9),b10=rnd(1,a10-1);return H(a10*10, b10*10+b1,"-");}, // ○0−□□
   b5:()=>pick([gens.b2,gens.b3,gens.b3,gens.b4,gens.b4])(),

function genBySub(g,area,sub){ // 同型の類題(数値違い)

function classify(q,val){
  const wrongDiff=Math.abs(val-q.ans);
  // --- 単元ごとの専用クラス(その他に落とさない) ---
  if(q.sub==="gosei5")   return "makeN";
  if(q.sub==="bunkai5")  return "splitN";
  if(q.sub==="ten_make") return "makeTen";
  if(q.sub==="ten_split")return "splitTen";
  if(q.sub==="ten_plus") return "tenPlus";
  if(q.sub==="ten_and")  return "tenAnd";
  if(q.sub==="skip")     return "skipCount";
  if(q.sub==="add_nc")   return "addBasic";
  if(q.sub==="sub_nb")   return "subBasic";
  if(q.sub==="zeroAdd"||q.sub==="zeroSub"||q.sub==="sameSub") return "zero";
  if(q.sub==="bigAdd"||q.sub==="bigSub") return "placeValue";
  if(q.sub==="carry"||q.sub==="carrySB"){
    if(wrongDiff===1&&val>q.ans) return "countOff";
    return "tenMake";}
  if(q.sub==="borrow"){
    if(val===q.a+q.b) return "addSub";
    return "tenMake2";}
  if(q.sub==="three"){
    if(val===q.a+q.b) return "threeStop";
    return "countOff";}
  if(q.op==="diff"){if(val===q.a+q.b)return "taleAdd";return "countOff2";}
  if(q.scene){
    if(val===Math.abs(q.a-q.b)&&q.op==="+")return "taleConfuse";
    if(val===q.a+q.b&&q.op==="-")return "taleConfuse";
    return "taleNum";}
  if(wrongDiff===1)return "countOff";
  return "generic";}

/* ---- 筆算 ---- */
function hissanHTML(q){
  const a=q.a,b=q.b,ansS=String(q.ans);
  const ad=[Math.floor(a/10)%10,a%10],bd=[Math.floor(b/10)%10,b%10];
  const cols=ansS.length>=3?3:2; // 百の位あり?
  B.hCells=[];for(let i=0;i<ansS.length;i++)B.hCells.push({d:+ansS[ansS.length-1-i],done:false}); // 一の位から
  let h=`<div class="hissan"><div class="h-grid">`;
  h+=`<div></div><div class="h-memo" id="memoH"></div><div class="h-memo"><span class="memo-box" id="memoT" title="くりあがり/くりさがりメモ"></span></div><div class="h-memo"></div>`;
  h+=`<div></div><div></div><div class="h-digit-top" id="topT">${ad[0]}</div><div class="h-digit-top" id="topO">${ad[1]}</div>`;
  h+=`<div class="h-op">${q.op==="+"?"+":"−"}</div><div></div><div>${bd[0]||""}</div><div>${bd[1]}</div>`;
  h+=`<div class="h-rule"></div>`;
  h+=`<div></div><div class="h-ans" id="hA2" style="${ansS.length>=3?"":"visibility:hidden"}"></div><div class="h-ans" id="hA1"></div><div class="h-ans active" id="hA0"></div>`;
  h+=`</div></div>`;return h;}
function bindHissan(){const m=$("memoT");if(m)m.onclick=()=>{sTap();m.textContent=m.textContent?"":"1";};}
function hissanCell(i){return $("hA"+i);}
function hissanInput(d){
  if(B.hPos>=B.hCells.length)return;
  const cell=B.hCells[B.hPos],el=hissanCell(B.hPos);
  el.textContent=d;sTap();
  if(d===cell.d){cell.done=true;el.classList.remove("active");el.classList.add("done");
    tone(880,now(),0.1,"triangle",0.07);B.hPos++;
    if(B.hPos<B.hCells.length){hissanCell(B.hPos).classList.add("active");
      if(B.hPos===2)hissanCell(2).style.visibility="visible";}
    else finishHissan();}
  else{setTimeout(()=>{el.textContent="";},500);hissanWrong(B.hPos,d);}}
function classifyHissanErr(place,val){
  const q=B.q,a1=q.a%10,b1=q.b%10,a10=Math.floor(q.a/10)%10,b10=Math.floor(q.b/10)%10;
  if(q.op==="-"){
    if(place===0){if(a1<b1&&val===b1-a1)return "reverseSub";if(a1===0)return "zeroBorrow";return "generic";}
    if(place===1){const borrow=a1<b1?1:0;if(borrow&&val===((a10-b10)%10+10)%10)return "borrowForget";return "generic";}}
  else{if(place===1){const carry=(a1+b1)>=10?1:0;if(carry&&val===(a10+b10)%10)return "carryForget";return "generic";}
    if(place===2)return "generic";
    return "generic";}
  return "generic";}
function hissanWrong(place,val){
  B.hWrong=true;let cls=classifyHissanErr(place,val);
  if(cls==="generic")cls="hissanCol";
  handleWrong(cls);}
function finishHissan(){handleCorrect();}
/* ---- おぼん(具体物)描画 ---- */
function blockHTML(g2){return `<span class="blk ${g2?"g2":""}"></span>`;}
function frameHTML(fill,cells=10,id="tf"){let h=`<div class="tenframe" id="${id}" style="${cells===5?"grid-template-rows:repeat(1,52px)":""}">`;
  for(let i=0;i<cells;i++)h+=`<div class="cell">${i<fill?blockHTML(false):""}</div>`;return h+"</div>";}
function looseHTML(n,g2,id="loose"){let h=`<div class="blk-loose" id="${id}">`;for(let i=0;i<n;i++)h+=blockHTML(g2);return h+"</div>";}
function bundlesHTML(n){let h=`<div id="bundles">`;for(let i=0;i<n;i++){h+=`<span class="bundle">`+`<i></i>`.repeat(10)+`</span>`;}return h+"</div>";}
function renderTray(t){
  const inner=$("tray-inner");
  if(!t){ // 筆算・場面: 補助メッセージのみ
    if(B.q&&B.q.type==="hissan")inner.innerHTML=`<div class="tray-msg">くらいごとに けいさんしよう。メモの □は タッチできるよ</div>`+bundlesHTML(Math.floor(B.q.a/10)%10)+looseHTML(B.q.a%10,true);
    else inner.innerHTML=`<div class="tray-msg">うえの おはなしを よく みてね 🔊</div>`;
    bindBlocks();return;}
  let h="";
  if(t.frame5!==undefined)h+=frameHTML(t.fill,5);
  if(t.frame!==undefined)h+=frameHTML(Math.min(10,t.frame));
  if(t.loose)h+=looseHTML(t.loose,true);
  if(t.two){h+=looseHTML(t.two[0],false,"gA");if(t.two[1]!==undefined)h+=looseHTML(t.two[1],true,"gB");}
  if(t.three){h+=looseHTML(t.three[0],false,"gA")+looseHTML(t.three[1],true,"gB")+`<div class="blk-loose" id="gC">${'<span class="blk" style="background:radial-gradient(circle at 32% 30%,#B8F2B0,#3E9B4F);border-color:#1F5D2A"></span>'.repeat(t.three[2])}</div>`;
  }
  if(t.plate!==undefined)h+=looseHTML(t.plate,false)+
    `<span style="font-size:34px;color:#FFEBC9;margin:0 6px">と</span>
     <span style="display:inline-flex;align-items:center;justify-content:center;width:110px;height:64px;
       border:4px dashed #FFEBC9;border-radius:14px;color:#FFEBC9;font-size:19px;font-weight:800">0こ<br>(なし)</span>`;
  if(t.bundles)h+=bundlesHTML(t.bundles);
  if(t.minus&&!t.frame&&!t.two)h+=`<div class="tray-msg">ここから ${t.minus}こ とるよ</div>`;
  if(t.groups){h="";for(let i=0;i<t.groups.n;i++)h+=looseHTML(t.groups.size,i%2===1,"g"+i);}
  h+=`<div class="tray-msg" id="tray-count">ブロックを タッチして かぞえてみよう</div>`;
  inner.innerHTML=h;bindBlocks();}
function bindBlocks(){let lit=0;
  $("tray-inner").querySelectorAll(".blk").forEach(b=>{b.onclick=()=>{sTap();
    b.classList.toggle("lit");lit=$("tray-inner").querySelectorAll(".blk.lit").length;
    const tc=$("tray-count");if(tc)tc.textContent=lit>0?lit+" こ":"ブロックを タッチして かぞえてみよう";};});}

/* ---- 入力 ---- */
document.querySelectorAll("#pad .key").forEach(k=>{k.onclick=()=>padPress(k.dataset.k);});
addEventListener("keydown",e=>{if(!$("scr-battle").classList.contains("on"))return;
  if(e.key>="0"&&e.key<="9")padPress(e.key);
  else if(e.key==="Enter")padPress("go");else if(e.key==="Backspace"){e.preventDefault();padPress("del");}
  else if(e.key==="+")padPress("+");else if(e.key==="-")padPress("-");});
function padPress(k){
  if(!B||B.busy||B.demo&&B.qCount===0)return;
  if(k==="spk"){sTap();speak(B.q.speech);return;}
  const q=B.q;
  if(q.type==="hissan"){if(k>="0"&&k<="9")hissanInput(+k);
    else if(k==="del"){sTap();const el=hissanCell(B.hPos);if(el)el.textContent="";}
    return;}
  if(q.type==="two"&&B.twoStage===0)return;
  sTap();
  if(q.type==="shiki"&&B.shikiStage===0){
    if(k>="0"&&k<="9"){if(B.shikiStr.length<7)B.shikiStr+=k;}
    else if(k==="+"||k==="-"){if(/\d$/.test(B.shikiStr)&&!/[+−-]/.test(B.shikiStr))B.shikiStr+=(k==="-"?"−":"+");}
    else if(k==="del")B.shikiStr=B.shikiStr.slice(0,-1);
    else if(k==="go"){checkShiki();return;}
    renderQuestion();return;}
  if(k>="0"&&k<="9"){if(B.input.length<3)B.input+=k;}
  else if(k==="del")B.input=B.input.slice(0,-1);
  else if(k==="go"){if(B.input!=="")checkAnswer();return;}
  renderQuestion();}
function twoPick(w){if(B.twoStage!==0)return;
  if(w===B.q.which){B.twoStage=1;tone(880,now(),0.12,"triangle",0.08);renderQuestion();}
  else handleWrong("countOff2");}
function checkShiki(){
  const q=B.q,s=B.shikiStr.replace("−","-");
  const m=s.match(/^(\d+)([+\-])(\d+)$/);
  if(!m){bubble("すうじと +か −で しきを つくろう");speak("すうじと、たすか ひくで、しきを つくろう");return;}
  const x=+m[1],op=m[2],y=+m[3];
  const okPlus=q.op==="+"&&op==="+"&&((x===q.a&&y===q.b)||(x===q.b&&y===q.a));
  const okMinus=q.op==="-"&&op==="-"&&x===q.a&&y===q.b;
  if(okPlus||okMinus){
    if(q.op==="+"&&x===q.b){bubble(`いいね! ${q.a}+${q.b}でも おなじだね`);speak(`いいね。${q.a}たす${q.b}でも おなじだね`);}
    else{sGood();bubble("しきが できた! こたえは?");}
    B.shikiStage=1;$("pad").classList.remove("shiki");renderQuestion();return;}
  if(q.op==="-"&&op==="-"&&x===q.b&&y===q.a){handleWrong("firstNum");return;}
  if((q.op==="+"&&op==="-")||(q.op==="-"&&op==="+")){handleWrong("taleConfuse");return;}
  handleWrong("taleNum");}
function checkAnswer(){
  const val=+B.input;
  if(val===B.q.ans)handleCorrect();
  else handleWrong(classify(B.q,val));}

    addExp(10);
    setTimeout(()=>{sGood();showHanamaru();},230);   // 斬撃のあとに「よくできました」

function addExp(n){if(B.replay)n=Math.ceil(n/2);

  if(nl>S.lvl[B.g]){const old=LEVELS[S.lvl[B.g]].atk;S.lvl[B.g]=nl;saveS();
    setTimeout(()=>levelUpFX(old,LEVELS[nl].atk),650);}
  else saveS();}

function afterResolve(correct,helped){
  if(B.tokkun){ // 特訓モード中
    if(correct){B.tokkun.streak++;if(B.tokkun.streak>=5){
        bubble("ばっちりだ! もどろう!");speak("ばっちりだ! もどろう!");sJingle();
        B.tokkun=null;B.errStreak={type:"",count:0};renderBattleChrome();
        setTimeout(nextQuestion,1500);return;}}
    else B.tokkun.streak=0;
    checkEnemyDefeat(()=>setTimeout(nextQuestion,700));return;}
  B.qCount++;B.log.n++;
  if(correct&&B.firstTry&&!helped){B.results.push(true);B.log.first++;B.errStreak={type:"",count:0};}
  else B.results.push(false);
  if(B.q.scene){const k=B.q.sub;B.log.scenes[k]=B.log.scenes[k]||{n:0,ok:0};B.log.scenes[k].n++;if(correct&&B.firstTry)B.log.scenes[k].ok++;}
  const fin=()=>{
    if(B.isBoss)bossTurn();
    const last4=B.results.slice(-4);
    if(B.results.length>=8&&last4.length===4&&last4.every(x=>x)){areaWin();return;}
    if(B.results.length>=14){areaTimeout();return;}
    const cheers=["すごい!","やるね!","かっこいい!","その ちょうし!"];
    if(correct&&Math.random()<0.5)bubble(pick(cheers),1600);
    setTimeout(nextQuestion,600);};
  checkEnemyDefeat(fin);}
function checkEnemyDefeat(cb){
  if(B.enemyHP<=0){
    B.busy=true;sPon();$("enemy-emoji").classList.add("defeat");
    bubble("たおした!");addExp(10);
    setTimeout(()=>{B.enemyHP=B.enemyMax;$("enemy-emoji").classList.remove("defeat");
      renderBattleChrome();cb&&cb();},950);}
  else cb&&cb();}
function bossTurn(){
  B.bossQ++;if(B.bossQ%3!==0)return;
  setTimeout(()=>{const en=$("enemy-actor");en.classList.add("dash");sHit();
    $("hero-actor").classList.add("shake");B.playerHP=Math.max(1,B.playerHP-2);
    bubble("いたた…でも へいき!");renderPlayerHP();
    setTimeout(()=>{en.classList.remove("dash");$("hero-actor").classList.remove("shake");
      if(B.playerHP<=4){sHeal();B.playerHP=playerStats(B.g).hp;renderPlayerHP();
        bubble("おうえんの かいふく! ✨");speak("おうえんの かいふく!");}},600);},900);}
/* ---- 誤答・ヒント ---- */
function handleWrong(cls){
  B.firstTry=false;B.input="";if(B.q.type!=="hissan")renderQuestion();
  sBad();oshiiPop();
  B.log.errors[cls]=(B.log.errors[cls]||0)+1;
  if(cls===B.errStreak.type)B.errStreak.count++;else B.errStreak={type:cls,count:1};
  B.hintStage++;B.log.hints++;
  if(B.hintStage===1&&!B.tokkun)B.retry.push({sub:B.q.sub,due:B.qCount+rnd(2,3)});
  if(B.errStreak.count>=3&&!B.tokkun&&PREREQ[B.g]&&PREREQ[B.g][B.area]!==undefined){startTokkun();return;}
  if(B.hintStage===1){setTimeout(()=>showHint(1,cls),600);}
  else if(B.hintStage===2){setTimeout(()=>{showHint(2,cls);hint2(cls);},600);}
  else{setTimeout(()=>walkthrough(),600);}}
function showHint(stage,cls){
  const t=hintText(cls,B.q,stage);
  const bar=$("hint-bar");
  bar.innerHTML=`<span class="hbadge">ヒント${stage===1?"①":"②"}</span><span>${t}</span>
    <button class="hspk" id="hint-spk">🔊</button>`;
  bar.style.display="flex";
  $("hint-spk").onclick=()=>{sTap();speak(t);};
  speak(t);
  if(stage===2){ // おぼんへ視線誘導
    const tray=$("tray");tray.classList.add("hl-tray");
    if(!$("tray-pointer")){const p=document.createElement("div");p.id="tray-pointer";
      p.className="tray-point";p.textContent="👇";tray.appendChild(p);}
    setTimeout(()=>{tray.classList.remove("hl-tray");
      const p=$("tray-pointer");if(p)p.remove();},4500);}}
function hideHint(){const bar=$("hint-bar");if(bar){bar.style.display="none";}
  const p=$("tray-pointer");if(p)p.remove();const tr=$("tray");if(tr)tr.classList.remove("hl-tray");}
function oshiiPop(){const o=document.createElement("div");o.className="oshii";
  o.textContent=pick(["おしい!","もう すこし!","おしい、おしい!"]);
  o.style.left="600px";o.style.top="300px";$("stage").appendChild(o);setTimeout(()=>o.remove(),1400);}

function hint2(cls){
  const q=B.q,inner=$("tray-inner");
  if(q.type==="hissan"&&(cls==="generic"||cls==="countOff")){
    const el=hissanCell(B.hPos);if(el)el.classList.add("active");
    speak("くらいごとに ゆっくり けいさんしよう。いまは "+(B.hPos===0?"いちのくらい":B.hPos===1?"じゅうのくらい":"ひゃくのくらい")+"だよ");return;}
  if(cls==="tenMake"&&(q.sub==="carry"||q.sub==="carrySB")){ // さくらんぼ
    const base=q.sub==="carrySB"?q.b:q.a,add=q.sub==="carrySB"?q.a:q.b;
    const p1=10-base,p2=add-p1;
    inner.innerHTML=frameHTML(base)+
      `<div class="cherry">${add}<div class="cline"></div><div class="split">
        <span class="cnode" id="ch1">${p1}</span><span class="cnode">${p2}</span></div></div>`+
      `<div class="tray-msg" id="tray-count"></div>`;
    speak(`${add}を ${p1}と ${p2}に わけよう。${base}に ${p1}を たすと、10!`);
    setTimeout(()=>{const tf=inner.querySelector(".tenframe");if(!tf)return;const cells=tf.querySelectorAll(".cell");
      let f=0;for(const c of cells){if(!c.firstChild&&f<p1){const b=document.createElement("span");b.className="blk g2 lit";c.appendChild(b);f++;sStamp();}}
      $("tray-count").textContent=`10と ${p2}で…?`;},1400);return;}
  if(cls==="tenMake2"||cls==="zeroBorrow"||(cls==="generic"&&q.sub==="borrow")){ // 10の束から引く
    inner.innerHTML=frameHTML(10)+looseHTML(q.a-10,true)+`<div class="tray-msg" id="tray-count"></div>`;
    speak(`10の まとまりから ${q.b}を ひいてみよう`);
    const cells=inner.querySelectorAll(".tenframe .blk");
    for(let i=0;i<q.b&&i<cells.length;i++)setTimeout(()=>{cells[i].classList.add("ghost");sTap();
      $("tray-count").textContent=(i+1)+"こ とった";},900+i*450);
    setTimeout(()=>{$("tray-count").textContent=`のこりは ぜんぶで いくつかな?`;},900+q.b*450+400);return;}
  if(cls==="reverseSub"||cls==="borrowForget"){ // 筆算: 束くずし
    const top=$("topT");if(top){top.classList.add("slashed");top.dataset.new=(Math.floor(B.q.a/10)%10)-1;}
    const memo=$("memoT");if(memo)memo.classList.add("blink");
    inner.innerHTML=`<div class="tray-msg">10の たばを 1本 くずして かんがえよう</div>`+
      bundlesHTML(Math.floor(B.q.a/10)%10)+looseHTML(B.q.a%10,true);
    const bd=inner.querySelector(".bundle");if(bd)setTimeout(()=>bd.classList.add("breaking"),700);
    speak(cls==="reverseSub"?"うえから ひけない ときは、となりの 10の たばを 1本 かりよう":"10の たばを 1本 かしたから、じゅうのくらいは 1 へるよ");return;}

/* ---- エリア終了 ---- */
function areaWin(){
  B.busy=true;
  const finish=()=>{
    const g=B.g,i=B.area,hid=B.hidden;
    const rate=B.log.n?B.log.first/B.log.n:0;
    const medal=rate>=0.8?3:rate>=0.6?2:1;
    let newFriend=null;
    if(hid){S.cleared[g][hiddenIdx(g)]=true;S.medals[g][hiddenIdx(g)]=Math.max(S.medals[g][hiddenIdx(g)],medal);}
    else{S.cleared[g][i]=true;S.medals[g][i]=Math.max(S.medals[g][i],medal);
      if(!S.zukan[g][i]&&i<friends(g).length){S.zukan[g][i]=true;newFriend=friends(g)[i];}}
    S.daily.areasToday++;
    let stamped=false,newRewards=[];
    const stampOK=!S.daily.adventureDone&&(!B.replay||adventureIdx(g)===-1);
    if(stampOK){
      S.daily.adventureDone=true;stamped=true;
      const t=todayKey();
      if(!S.stampDates.includes(t))S.stampDates.push(t);
      S.streak=(S.lastStamp===yesterKey())?S.streak+1:1;
      S.lastStamp=t;
      for(const r of REWARDS){if(S.streak>=r.d&&!S.rewards[r.key]){S.rewards[r.key]=true;newRewards.push(r);}}}
    S.sessions.push(B.log);if(S.sessions.length>40)S.sessions.shift();
    saveS();
    showClear({medal,newFriend,stamped,newRewards,hid,timeout:false});};
  if(B.isBoss){sJingle();bubble("やったー! ぬしを たおした!",2800);speak("やったー! ぬしを たおした!");
    $("enemy-emoji").classList.add("defeat");setTimeout(finish,1600);}
  else{$("enemy-emoji").classList.add("defeat");sPon();setTimeout(finish,1000);}}

  B.busy=true;S.sessions.push(B.log);if(S.sessions.length>40)S.sessions.shift();saveS();

  showClear({timeout:true});}

      setTimeout(sStamp,900);}
    for(const r of o.newRewards||[]){h+=`<div style="font-size:22px; background:#FFF3C4; border-radius:12px; padding:6px 14px; margin-top:8px">🎁 ごほうび かくとく: ${r.label}</div>`;}
    c.innerHTML=h;

  mk("マップへ",()=>{
    if(!o.timeout&&S.daily.areasToday>0&&S.daily.areasToday%2===0)startBreak();
    else enterMap(false);});}

let goldPickMode=false;
function adventureIdx(g){const A=areas(g);
  for(let i=0;i<A.length;i++)if(!S.cleared[g][i])return i;
  if(!S.cleared[g][hiddenIdx(g)]&&S.zukan[g].filter(x=>x).length>=friends(g).length)return hiddenIdx(g);
  return -1;} // 全クリア
function enterMap(greet){
  const g=S.grade;show("scr-map");
  $("map-world").textContent=g===1?"🦕 きょうりゅうの もり":"🌊 きょうりゅうの うみ";
  $("map-level").textContent="Lv"+S.lvl[g];
  $("map-zukan-pill").textContent="なかま "+S.zukan[g].filter(x=>x).length+"/"+friends(g).length;
  $("map-streak").textContent="☀️ れんぞく "+S.streak+"にち";
  $("bg-stars").innerHTML=S.rewards.star?[["120px","140px"],["300px","90px"],["1000px","120px"],["1150px","220px"]].map(p=>`<div class="mapstar" style="left:${p[0]};top:${p[1]}">⭐</div>`).join(""):"";
  const wrap=$("map-wrap");wrap.innerHTML="";
  const A=areas(g),F=friends(g);
  const nodes=[];
  const adv=adventureIdx(g);
  for(let i=0;i<A.length;i++){
    const cleared=S.cleared[g][i];
    let cls="node",state="locked";
    if(cleared){cls+=" cleared";state="tokkun";}
    else if(i===adv&&!S.daily.adventureDone){cls+=" today";state="go";}
    else if(i===adv&&S.daily.adventureDone){cls+=" ribbon";state="ribbon";}
    else cls+=" locked";
    nodes.push({i,cls,state,key:F[Math.min(i,F.length-1)].key,name:A[i].name,medal:S.medals[g][i]});}
  // 隠しボス
  const allBase=A.every((_,i)=>S.cleared[g][i]);
  if(allBase){const hi=hiddenIdx(g);const hcl=S.cleared[g][hi];
    let cls="node hiddenboss"+(hcl?" cleared":(hi===adv&&!S.daily.adventureDone?" today":(hi===adv?" ribbon":"")));
    nodes.push({i:hi,cls,state:hcl?"tokkun-hidden":(hi===adv&&!S.daily.adventureDone?"go-hidden":(hi===adv?"ribbon":"locked")),
      key:HIDDEN[g].key,name:HIDDEN[g].n,medal:S.medals[g][hi]});}
  // 蛇行レイアウト(1行7)
  for(let r=0;r*7<nodes.length;r++){
    const row=document.createElement("div");row.className="map-row"+(r%2?" rev":"");
    nodes.slice(r*7,r*7+7).forEach(nd=>{
      const el=document.createElement("div");el.className=nd.cls;
      el.innerHTML=`${nd.medal?`<span class="medal">${medalEmoji(nd.medal)}</span>`:""}
        <img class="nimg" src="${iconSrc(nd.key)}"><span class="nname">${nd.name}</span>`;
      if(nd.state==="go"||nd.state==="go-hidden"){el.innerHTML+=`<div class="mascot-map">${mascotSVG(48)}</div>`;
        el.onclick=()=>{sTap();startBattle(g,nd.i,{hidden:nd.state==="go-hidden"});};}
      else if(nd.state==="tokkun")el.onclick=()=>{sTap();startBattle(g,nd.i,{replay:true});};
      else if(nd.state==="tokkun-hidden")el.onclick=()=>{sTap();startBattle(g,nd.i,{replay:true,hidden:true});};
      row.appendChild(el);});
    wrap.appendChild(row);}
  // メッセージ
  let msg;
  if(adv<0)msg="ぜんぶ クリア! きみは けいさんマスターだ! 👑 とっくんで メダルを ピカピカに しよう!";
  else if(S.daily.adventureDone)msg="きょうの ぼうけんは おわり! とっくんで メダルを ピカピカに しよう! つづきは また あした 🎀";
  else if(allBase&&adv===hiddenIdx(g))msg="ずかんが そろった! まおうが あらわれた!";
  else msg="きょうの ぼうけんは ここだ!";
  $("map-msg").textContent=msg;
  if(greet){
    let say=msg;
    if(!S.daily.adventureDone){
      if(S.lastStamp===yesterKey())say="おかえり! きょうも ぼうけんに いこう!";
      else if(S.lastStamp&&S.lastStamp!==todayKey())say="まってたよ! つづきから いこう!";}
    speak(say);}
}

    const key=y+"-"+String(m+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");
    const c=document.createElement("div");c.className="cal-cell"+(i>d.getDate()?" future":"");
    c.innerHTML=`<span class="d">${m+1}/${i}</span><span class="s">${S.stampDates.includes(key)?"☀️":""}</span>`;
    gr.appendChild(c);}
  const rl=$("reward-list");rl.innerHTML="";
  REWARDS.forEach(r=>{const el=document.createElement("div");
    el.className="rw "+(S.rewards[r.key]?"got":"locked");
    el.textContent=(S.rewards[r.key]?"✅ ":"🔒 れんぞく"+r.d+"にち: ")+r.label;
    rl.appendChild(el);});}
$("btn-cal").onclick=()=>{sTap();openCal();};
$("btn-cal-back").onclick=()=>{sTap();enterMap(false);};

/* ================= 保護者サマリ ================= */
const ERRNAME={countOff:"数え間違い(1ずれ)",tenMake:"10の合成わすれ",tenMake2:"くり下がりの処理",addSub:"たし算・ひき算の混同",
 threeStop:"3口の途中止まり",zero:"0の扱い",placeValue:"位の混同",taleAdd:"求差で加算",taleConfuse:"場面と演算の混同",
 taleNum:"数の拾い間違い",firstNum:"式の順序",reverseSub:"上下逆に引く",carryForget:"くり上がり書き忘れ",
 borrowForget:"くり下がり処理忘れ",zeroBorrow:"0からのくり下がり",countOff2:"大小比較",generic:"その他"};
const SCENENAME={awasete:"あわせて(合併)",fueru:"ふえると(増加)",nokori:"のこりは(求残)",chigai:"ちがいは(求差)",chigaiPic:"ちがいは(絵つき)",dochira:"どちらが多い",shikiPlus:"式づくり(+)",shikiMinus:"式づくり(−)",shikiMix:"式づくり(混合)"};
function openParent(){show("scr-parent");
  const bd=$("parent-body");
  let h=`<h3>お子さまの学習記録</h3>
  <p>連続日数: <b>${S.streak}日</b> / 累計スタンプ: <b>${S.stampDates.length}個</b> / 1年モード Lv${S.lvl[1]}・2年モード Lv${S.lvl[2]}</p>
  <h3>最近のセッション(新しい順)</h3><table><tr><th>日付</th><th>モード</th><th>エリア</th><th>問題数</th><th>初回正答</th><th>ヒント使用</th><th>つまずき</th><th>特訓</th></tr>`;
  const ss=[...S.sessions].reverse().slice(0,14);
  if(!ss.length)h+=`<tr><td colspan="8">まだ記録がありません</td></tr>`;
  for(const s of ss){
    const errs=Object.entries(s.errors).map(([k,v])=>`${ERRNAME[k]||k}×${v}`).join("、")||"なし";
    h+=`<tr><td>${s.date}</td><td>${s.g}年</td><td>${s.area}</td><td>${s.n}</td><td>${s.first}(${s.n?Math.round(s.first/s.n*100):0}%)</td><td>${s.hints}回</td><td>${errs}</td><td>${s.stepdown?"あり":"—"}</td></tr>`;}
  h+=`</table><h3>文章題の場面別正答(累計・初回正答ベース)</h3><table><tr><th>場面</th><th>出題</th><th>初回正答</th></tr>`;
  const agg={};for(const s of S.sessions)for(const[k,v]of Object.entries(s.scenes||{})){agg[k]=agg[k]||{n:0,ok:0};agg[k].n+=v.n;agg[k].ok+=v.ok;}
  if(!Object.keys(agg).length)h+=`<tr><td colspan="3">まだ記録がありません</td></tr>`;
  for(const[k,v]of Object.entries(agg))h+=`<tr><td>${SCENENAME[k]||k}</td><td>${v.n}</td><td>${v.ok}</td></tr>`;
  h+=`</table><p style="color:#666">※「初回正答」はヒントなしで最初に正解できた問題数です。つまずきが続く単元は、アプリ内で自動的に一つ前のステップへ戻って練習します(特訓)。同じ種類のつまずきが多い場合は、ブロックやおはじきなど実物で一緒に数える時間をとってあげてください。</p>`;
  bd.innerHTML=h;}
$("btn-parent").onclick=()=>{sTap();openParent();};
$("btn-parent-back").onclick=()=>{sTap();enterMap(false);};

/* ================= 起動 ================= */
$("btn-start").onclick=()=>{audioInit();sTap();if(bgmOn&&!bgmTimer)bgmLoop();
  $("btn-bgm").textContent=bgmOn?"🎵":"🔇";$("btn-bgm2").textContent=bgmOn?"🎵":"🔇";
  show("scr-grade");speak("がくねんを えらんでね");};
document.querySelectorAll(".grade-btn").forEach(b=>{b.onclick=()=>{sTap();
  S.grade=+b.dataset.g;saveS();enterMap(true);};});
if(S.rewards.crown)$("title-crown").innerHTML="👑 でんせつの ゆうしゃ「まいにち マスター」";
if(!store.ok)$("title-hint").textContent="🔊 おとが でるよ(この かんきょうでは きろくは のこらないよ)";
</script>
