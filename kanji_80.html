<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>かんじのたね</title>
<style>
:root{
  --ink:#2E4633;        /* 深いモスグリーン(インク) */
  --leaf:#58B368;       /* 若葉(アクセント) */
  --leaf-dk:#3E8F4E;
  --soil:#8A6D4B;       /* 土 */
  --marigold:#F5A623;   /* 花・スタンプ */
  --paper:#FDFDF7;      /* カード */
  --field:#EAF4E2;      /* 背景の畑 */
  --sky:#D7ECF5;
  --line:#CFE0C8;
  --oshii:#C97B7B;
  --kyokasho:"UD デジタル 教科書体 N-R","UD Digi Kyokasho N-R","Klee One","Yu Mincho","Hiragino Mincho ProN",serif;
  --maru:"Hiragino Maru Gothic ProN","BIZ UDGothic","Rounded Mplus 1c","Meiryo",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;
  background:linear-gradient(180deg,var(--sky) 0%,var(--field) 42%,var(--field) 100%);
  font-family:var(--maru);color:var(--ink);
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  -webkit-text-size-adjust:100%;overscroll-behavior:none;touch-action:manipulation;}
#viewport{position:fixed;inset:0;}
#stage{width:1024px;height:768px;position:absolute;transform-origin:0 0;}

/* ===== 共通部品 ===== */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;}
.screen.on{display:flex;}
button{font-family:var(--maru);color:var(--ink);cursor:pointer;border:none;background:none;}
button:focus-visible{outline:4px solid var(--leaf);outline-offset:3px;border-radius:14px;}
.btn{background:var(--leaf);color:#fff;border-radius:22px;font-size:34px;font-weight:bold;
  padding:22px 56px;min-height:80px;min-width:200px;box-shadow:0 6px 0 var(--leaf-dk);
  transition:transform .08s;}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--leaf-dk);}
.btn.sub{background:var(--paper);color:var(--ink);box-shadow:0 5px 0 var(--line);font-size:26px;min-height:66px;padding:14px 34px;min-width:120px;}
.card{background:var(--paper);border:3px solid var(--line);border-radius:28px;box-shadow:0 8px 20px rgba(46,70,51,.08);}
ruby rt{font-size:.4em;}

/* 上部バー */
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;}
.dots{display:flex;gap:10px;align-items:center;}
.dot{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--line);}
.dot.done{background:var(--leaf);border-color:var(--leaf);}
.dot.now{border-color:var(--marigold);background:var(--marigold);transform:scale(1.25);}
.icon-btn{width:84px;height:84px;border-radius:50%;background:var(--paper);border:3px solid var(--line);
  font-size:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 var(--line);}
.icon-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--line);}
.icon-btn.talking{border-color:var(--marigold);animation:pulse .6s infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.1);}}
.stepname{font-size:30px;font-weight:bold;background:#fff;border-radius:999px;padding:8px 30px;border:3px solid var(--line);}

/* ===== タイトル ===== */
#scr-title{justify-content:center;gap:20px;}
#title-logo{font-family:var(--kyokasho);font-size:110px;letter-spacing:.08em;text-align:center;line-height:1.15;}
#title-logo .seed{display:inline-block;animation:sway 2.6s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
#title-sub{font-size:28px;opacity:.85;}
#title-sprout{width:180px;height:150px;}

/* ===== セットえらび ===== */
#scr-sets{overflow:hidden;}
#scr-sets h2{font-size:34px;margin:4px 0 10px;}
#set-grid{display:grid;grid-template-columns:repeat(4,210px);gap:14px;max-height:515px;overflow-y:auto;overscroll-behavior:contain;touch-action:pan-y;padding:4px 12px 28px;scrollbar-gutter:stable;}
#set-grid .set-card{width:210px;height:118px;min-height:118px;padding:10px 8px;gap:6px;}
#set-grid .set-card .sname{font-size:20px;}
#set-grid .set-card .schars{font-size:36px;}
.set-card{width:380px;height:206px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;transition:transform .1s;}
.set-card:active{transform:scale(.97);}
.set-card .sname{font-size:34px;font-weight:bold;}
.set-card .schars{font-family:var(--kyokasho);font-size:46px;letter-spacing:.18em;}
.set-card .schars .unk{color:#B9C8B4;}
.set-card .cleared{position:absolute;top:-16px;right:-10px;font-size:52px;transform:rotate(12deg);}
#zukan-open{margin-top:8px;}

/* ===== なりたち(デモ・ヒント共用) ===== */
.naritachi{position:relative;width:320px;height:320px;display:flex;align-items:center;justify-content:center;}
.naritachi .pict{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.naritachi .pict svg{width:290px;height:290px;}
.naritachi .glyph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;}
.naritachi.play .pict{animation:pictOut 2.2s ease forwards;}
.naritachi.play .glyph{animation:glyphIn 2.2s ease forwards;}
@keyframes pictOut{0%{opacity:1;transform:scale(1) rotate(0);}45%{opacity:1;transform:scale(1.06) rotate(-3deg);}80%{opacity:0;transform:scale(.55);}100%{opacity:0;}}
@keyframes glyphIn{0%,40%{opacity:0;transform:scale(.5);}70%{opacity:1;transform:scale(1.12);}85%{transform:scale(.96);}100%{opacity:1;transform:scale(1);}}

/* ===== デモ・クイズ ===== */
#scr-demo,#scr-quiz{justify-content:flex-start;}
.qarea{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:0;}
#q-main{display:flex;align-items:center;justify-content:center;min-height:310px;}
#q-kanji{font-family:var(--kyokasho);font-size:180px;line-height:1;padding:10px 56px;}
#q-pict svg{width:290px;height:290px;}
.choices{display:flex;gap:34px;margin-bottom:22px;}
.choices.five{gap:18px;}
.choices.five .choice{width:182px;height:116px;font-size:34px;}
.choice{width:230px;height:136px;font-size:52px;font-weight:bold;border-radius:24px;background:var(--paper);
  border:4px solid var(--line);box-shadow:0 7px 0 var(--line);transition:transform .08s;}
.choice.kchoice{font-family:var(--kyokasho);font-size:78px;font-weight:normal;}
.choice:active{transform:translateY(4px);box-shadow:0 3px 0 var(--line);}
.choice.correct{background:#EAF8EC;border-color:var(--leaf);box-shadow:0 7px 0 var(--leaf-dk);}
.choice.oshii{animation:shake .4s;border-color:var(--oshii);}
.choice.dim{opacity:.45;}
.choice.spot{animation:spot 1s infinite alternate;border-color:var(--marigold);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
@keyframes spot{from{transform:scale(1);}to{transform:scale(1.06);}}

/* ===== なぞり ===== */
#scr-trace{justify-content:flex-start;}
#trace-wrap{display:flex;align-items:center;gap:40px;flex:1;}
#trace-side{display:flex;flex-direction:column;gap:22px;align-items:center;width:230px;}
#trace-word{font-size:34px;font-weight:bold;background:#fff;border-radius:16px;padding:10px 24px;border:3px solid var(--line);}
#trace-count{font-size:26px;opacity:.8;}
#trace-svgbox{width:540px;height:540px;touch-action:none;position:relative;}
#trace-svg{width:100%;height:100%;border-radius:28px;background:var(--paper);border:3px solid var(--line);
  background-image:linear-gradient(var(--field) 2px,transparent 2px),linear-gradient(90deg,var(--field) 2px,transparent 2px);
  background-size:130px 130px;background-position:center;}
.glyph-ghost{fill:#DDE8D4;stroke:#C3D6BA;stroke-width:1.5;}
.glyph-ghost-img{opacity:.18;}
.stk-ink{fill:none;stroke:var(--leaf-dk);stroke-width:24;stroke-linecap:round;stroke-linejoin:round;opacity:.78;}
.glyph-final{fill:#2E4633;transform-origin:center;animation:inkIn .55s ease forwards;}
.glyph-final-img{transform-origin:center;animation:inkIn .55s ease forwards;}
@keyframes inkIn{from{opacity:0;transform:scale(.92);}60%{opacity:1;transform:scale(1.04);}to{opacity:1;transform:scale(1);}}
.stk-done{fill:none;stroke:var(--ink);stroke-width:23;stroke-linecap:round;stroke-linejoin:round;}
.stk-live{fill:none;stroke:var(--leaf);stroke-width:23;stroke-linecap:round;stroke-linejoin:round;opacity:.9;}
.stk-demo{fill:none;stroke:var(--marigold);stroke-width:23;stroke-linecap:round;stroke-linejoin:round;}
.start-dot{fill:var(--leaf);animation:dotPulse 1s infinite alternate;}
.start-num{fill:#fff;font-size:26px;font-weight:bold;font-family:var(--maru);text-anchor:middle;dominant-baseline:central;}
@keyframes dotPulse{from{r:16;}to{r:20;}}

/* ===== フィードバック ===== */
#fb-layer{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;z-index:40;}
#hanamaru{width:340px;height:340px;opacity:0;}
#hanamaru.show{animation:maruIn .9s ease forwards;}
@keyframes maruIn{0%{opacity:0;transform:scale(.3) rotate(-20deg);}55%{opacity:1;transform:scale(1.1) rotate(4deg);}100%{opacity:1;transform:scale(1) rotate(0);}}
.confetti{position:absolute;width:14px;height:14px;border-radius:4px;animation:confFall 1.2s ease-in forwards;}
@keyframes confFall{0%{transform:translateY(-30px) rotate(0);opacity:1;}100%{transform:translateY(320px) rotate(400deg);opacity:0;}}
#oshii-tag{position:absolute;top:34%;font-size:44px;font-weight:bold;color:var(--oshii);background:#fff;
  border-radius:999px;padding:12px 40px;border:3px solid var(--oshii);opacity:0;}
#oshii-tag.show{animation:oshiiIn .8s ease forwards;}
@keyframes oshiiIn{0%{opacity:0;transform:translateY(10px);}20%,80%{opacity:1;transform:translateY(0);}100%{opacity:0;}}

/* ===== オーバーレイ ===== */
.overlay{position:absolute;inset:0;background:rgba(46,70,51,.35);display:none;align-items:center;justify-content:center;z-index:60;}
.overlay.on{display:flex;}
.panel{max-width:880px;max-height:730px;padding:30px 44px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.panel h3{font-size:40px;}
.compare{display:flex;gap:50px;align-items:center;}
.compare .cmp{display:flex;flex-direction:column;align-items:center;gap:10px;}
.compare .cmp .ch{font-family:var(--kyokasho);font-size:150px;line-height:1;padding:6px 30px;border-radius:22px;}
.compare .cmp.good .ch{color:var(--leaf-dk);background:#EAF8EC;animation:spot 1s infinite alternate;}
.compare .cmp.bad .ch{color:#9AA79B;}
.compare .cmp .lb{font-size:30px;font-weight:bold;}
.vs{font-size:40px;opacity:.5;}

/* ===== けっか・ずかん ===== */
#scr-result{justify-content:center;gap:26px;}
#result-stamp{width:240px;height:240px;}
#result-msg{font-size:46px;font-weight:bold;}
#zukan-panel{width:960px;height:710px;max-height:calc(100% - 24px);padding:18px 26px 16px;gap:10px;overflow:hidden;}
#zukan-head{width:100%;display:grid;grid-template-columns:70px 1fr 70px;align-items:center;flex:0 0 auto;}
#zukan-head h3{text-align:center;}
#zukan-back{width:64px;height:64px;font-size:34px;justify-self:start;}
#zukan-help{font-size:22px;font-weight:bold;flex:0 0 auto;}
#zukan-scroll{width:100%;flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:6px 12px 24px;
  -webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain;scrollbar-gutter:stable;}
#zukan-grid{display:grid;grid-template-columns:repeat(5,150px);justify-content:center;gap:22px;padding-bottom:8px;}
#zukan-actions{width:100%;display:flex;justify-content:center;flex:0 0 auto;padding-top:2px;background:var(--paper);}
#zukan-close{font-size:27px;min-height:62px;padding:12px 34px;}
.z-cell{width:150px;height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;background:var(--paper);border:3px solid var(--line);position:relative;
  box-shadow:0 5px 0 var(--line);touch-action:manipulation;}
.z-cell:active{transform:translateY(3px);box-shadow:0 2px 0 var(--line);}
.z-cell .flower{width:92px;height:92px;position:relative;display:flex;align-items:center;justify-content:center;}
.z-cell .flower svg{position:absolute;inset:0;width:100%;height:100%;}
.z-cell .zk{font-family:var(--kyokasho);font-size:50px;position:relative;z-index:2;}
.z-cell.seed .flower::before{content:"🌱";position:absolute;right:-7px;top:-8px;font-size:27px;z-index:3;}
.z-cell.seed .zk{color:var(--ink);font-size:50px;}
.z-cell .zy{font-size:20px;margin-top:6px;}
.z-cell.bloom{border-color:var(--marigold);box-shadow:0 5px 0 #D99116;}
.z-cell.bloom.newly{animation:bloomPop .8s ease;}
@keyframes bloomPop{0%{transform:scale(.6);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
#parent-body{max-height:480px;overflow-y:auto;font-size:24px;line-height:1.8;width:100%;}
#parent-body table{border-collapse:collapse;width:100%;}
#parent-body td,#parent-body th{border-bottom:1px solid var(--line);padding:8px 10px;text-align:left;}
#parent-body .ng{color:#B05B5B;}

#rotate-hint{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#D7ECF5,#EAF4E2);color:var(--ink);text-align:center;}
#rotate-hint .rot-inner{display:flex;flex-direction:column;gap:20px;align-items:center;}
#rotate-hint .rot-ico{font-size:90px;animation:rotpulse 1.6s ease-in-out infinite;}
#rotate-hint .rot-txt{font-size:34px;font-weight:bold;font-family:var(--maru);}
@keyframes rotpulse{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
@media (orientation:portrait) and (max-width:1100px){ #rotate-hint:not([data-dismissed]){display:flex;} }
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01s !important;transition-duration:.01s !important;}
}

@media (max-width:900px){#set-grid{grid-template-columns:repeat(3,210px);max-height:515px;}}
@media (max-width:690px){#set-grid{grid-template-columns:repeat(2,190px);}#set-grid .set-card{width:190px;}}
</style>
</head>
<body>
<div id="viewport"><div id="stage">

  <!-- タイトル -->
  <section class="screen on" id="scr-title">
    <svg id="title-sprout" viewBox="0 0 120 100" aria-hidden="true">
      <path d="M60 92 L60 55" stroke="#3E8F4E" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M60 62 C40 60 32 44 30 32 C46 34 58 44 60 58 Z" fill="#58B368"/>
      <path d="M60 56 C78 52 86 38 88 26 C70 28 60 40 60 52 Z" fill="#79C784"/>
      <ellipse cx="60" cy="94" rx="26" ry="6" fill="#8A6D4B" opacity=".5"/>
    </svg>
    <h1 id="title-logo">かんじの<span class="seed">たね</span></h1>
    <p id="title-sub">たねを そだてて かんじの はなを さかせよう</p>
    <button class="btn" id="btn-start">はじめる</button>
    <div style="font-size:14px;opacity:.62;margin-top:-8px;">字形・書き順参照：<a href="https://kakijun.com/kanji/shogaku/1/" target="_blank" rel="noopener" style="color:inherit;">漢字書き順辞典</a></div>
  </section>

  <!-- セットえらび -->
  <section class="screen" id="scr-sets">
    <div class="topbar"><button class="icon-btn" id="btn-home" aria-label="タイトルへ">🏠</button>
      <h2>きょうの たねを えらぼう <small style="font-size:.48em;color:#5D7859">（80字）</small></h2><span style="width:84px"></span></div>
    <div id="set-grid"></div>
    <button class="btn sub" id="zukan-open">🌼 ずかんを みる</button>
  </section>

  <!-- お手本デモ -->
  <section class="screen" id="scr-demo">
    <div class="topbar"><span class="stepname">おてほん</span><span></span>
      <button class="icon-btn" id="demo-sound" aria-label="もういちど きく">🔊</button></div>
    <div class="qarea" id="demo-area"></div>
  </section>

  <!-- クイズ(よみ・えらび) -->
  <section class="screen" id="scr-quiz">
    <div class="topbar">
      <span class="stepname" id="q-step">よみ</span>
      <div class="dots" id="q-dots"></div>
      <button class="icon-btn" id="q-sound" aria-label="もういちど きく">🔊</button>
    </div>
    <div class="qarea">
      <div id="q-main"></div>
      <div class="choices" id="q-choices"></div>
    </div>
  </section>

  <!-- なぞり -->
  <section class="screen" id="scr-trace">
    <div class="topbar">
      <span class="stepname">なぞり</span>
      <div class="dots" id="t-dots"></div>
      <button class="icon-btn" id="t-sound" aria-label="もういちど きく">🔊</button>
    </div>
    <div id="trace-wrap">
      <div id="trace-side">
        <div id="trace-word">やま</div>
        <div id="trace-count">1かくめ / 3かく</div>
        <button class="btn sub" id="btn-otehon">おてほんを みる</button>
        <button class="btn sub" id="btn-kakinaosu">かきなおす</button>
      </div>
      <div id="trace-svgbox"><svg id="trace-svg" viewBox="0 0 520 520"></svg></div>
    </div>
  </section>

  <!-- けっか -->
  <section class="screen" id="scr-result">
    <svg id="result-stamp" viewBox="0 0 200 200"></svg>
    <div id="result-msg">よくできました!</div>
    <div style="display:flex;gap:26px;">
      <button class="btn" id="btn-zukan2">🌼 ずかんを みる</button>
      <button class="btn sub" id="btn-again">つぎの たねへ</button>
    </div>
    <button class="btn sub" id="btn-parent" style="font-size:22px;">おうちのひとへ</button>
  </section>

  <!-- フィードバック層 -->
  <div id="fb-layer">
    <svg id="hanamaru" viewBox="0 0 200 200" aria-hidden="true">
      <path id="maru-path" d="M100 30 C 150 25 175 65 172 100 C 169 145 135 172 98 172 C 55 172 28 140 28 100 C 28 60 58 30 100 28 C 128 27 150 40 160 58"
        fill="none" stroke="#F5A623" stroke-width="14" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="0" fill="none"/>
    </svg>
    <div id="oshii-tag">おしい!</div>
  </div>

  <!-- くらべる(ヒント2) -->
  <div class="overlay" id="ovl-compare"><div class="card panel">
    <h3>どこが ちがうかな?</h3>
    <div class="compare" id="cmp-body"></div>
    <button class="btn" id="cmp-ok">もういちど やってみる</button>
  </div></div>

  <!-- いっしょにかくにん(解説) -->
  <div class="overlay" id="ovl-walk"><div class="card panel">
    <h3 id="walk-title">いっしょに かくにんしよう</h3>
    <div class="naritachi" id="walk-naritachi"></div>
    <div id="walk-text" style="font-size:32px;font-weight:bold;"></div>
    <button class="btn" id="walk-ok">わかった!</button>
  </div></div>

  <!-- ずかん -->
  <div class="overlay" id="ovl-zukan"><div class="card panel" id="zukan-panel">
    <div id="zukan-head">
      <button class="icon-btn" id="zukan-back" aria-label="メニューにもどる">↩</button>
      <h3>かんじの はな ずかん</h3>
      <span aria-hidden="true"></span>
    </div>
    <div id="zukan-help">れんしゅうする かんじを タッチしてね</div>
    <div id="zukan-scroll"><div id="zukan-grid"></div></div>
    <div id="zukan-actions"><button class="btn sub" id="zukan-close">メニューにもどる</button></div>
  </div></div>

  <!-- おうちのひとへ -->
  <div class="overlay" id="ovl-parent"><div class="card panel" style="max-width:920px;">
    <h3 style="font-family:var(--maru);">おうちの方へ(きょうの記録)</h3>
    <div id="parent-body"></div>
    <button class="btn" id="parent-close">とじる</button>
  </div></div>

  <!-- きゅうけい -->
  <div class="overlay" id="ovl-break"><div class="card panel">
    <div style="font-size:80px;">🍵</div>
    <h3>きゅうけいしよう!</h3>
    <div style="font-size:28px;">2かい がんばったね。すこし めを やすめよう。</div>
    <button class="btn sub" id="break-close">わかった</button>
  </div></div>

</div></div>

<div id="rotate-hint" aria-hidden="true">
  <div class="rot-inner">
    <div class="rot-ico">📱↻</div>
    <div class="rot-txt">よこむきに すると あそびやすいよ</div>
    <button class="btn sub" id="rotate-ok">このまま つづける</button>
  </div>
</div>
<script>
"use strict";
/* ================= データ ================= */

function pictSVG(key,size){

}
function glyphImage(char,cls){

}

}

/* ================= 効果音 (Web Audio / ノードベース) ================= */
const Snd = (()=>{
  let ctx=null,sfx=null;
  function ensure(){
    if(!ctx){ ctx=new (window.AudioContext||window.webkitAudioContext)();
      sfx=ctx.createGain(); sfx.gain.value=0.9; sfx.connect(ctx.destination); }
    if(ctx.state==="suspended") ctx.resume();
    return ctx;
  }
  function unlock(){
    ensure();
    // iOS: 無音バッファを鳴らしてWebAudioを解禁
    try{ const b=ctx.createBuffer(1,1,22050); const s=ctx.createBufferSource(); s.buffer=b; s.connect(ctx.destination); s.start(0); }catch(e){}
  }
  document.addEventListener("pointerdown",unlock,{passive:true});
  document.addEventListener("touchstart",unlock,{passive:true});
  function tone({freq=440,shape="sine",when=0,dur=0.15,attack=0.008,vol=0.35}){
    const c=ensure(),t0=(when||c.currentTime)+0.02;
    const v=vol*(1+(Math.random()*2-1)*0.03), f=freq*(1+(Math.random()*2-1)*0.01);
    const o=c.createOscillator(); o.type=shape; o.frequency.value=f;
    const g=c.createGain();
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(v,t0+attack);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(g); g.connect(sfx); o.start(t0); o.stop(t0+dur+0.05);
  }
  return {
    ensure,
    tap(){ tone({freq:1500,dur:0.05,vol:0.12}); },
    pick(){ tone({freq:900,dur:0.07,vol:0.16}); },
    correct(){ const t=ensure().currentTime;
      tone({freq:659,when:t,dur:0.16,vol:0.3}); tone({freq:831,when:t+0.09,dur:0.28,vol:0.3}); },
    oshii(){ const t=ensure().currentTime;
      tone({freq:330,when:t,dur:0.12,vol:0.18,attack:0.012}); tone({freq:294,when:t+0.11,dur:0.2,vol:0.16,attack:0.012}); },
    strokeOk(){ tone({freq:988,dur:0.09,vol:0.2}); },
    fanfare(){ const t=ensure().currentTime,n=[523,659,784,1047];
      n.forEach((f,i)=>tone({freq:f,when:t+i*0.09,dur:i===3?0.5:0.14,vol:0.3})); },
    bloom(){ const t=ensure().currentTime,n=[523,587,659,784,880];
      n.forEach((f,i)=>tone({freq:f,when:t+i*0.07,dur:0.12,vol:0.22})); },
    stamp(){ const t=ensure().currentTime;
      tone({freq:150,shape:"triangle",when:t,dur:0.16,vol:0.4,attack:0.004});
      tone({freq:95,shape:"triangle",when:t+0.02,dur:0.2,vol:0.35,attack:0.004}); },
  };
})();

const Voice = (()=>{
  let jaVoice=null;
  function pick(){ const vs=speechSynthesis.getVoices();
    jaVoice = vs.find(v=>/ja/i.test(v.lang)&&/kyoko|female|o-?ren/i.test(v.name)) || vs.find(v=>/ja/i.test(v.lang)) || null; }
  if("speechSynthesis" in window){ pick(); speechSynthesis.onvoiceschanged=pick; }
  let warmed=false;
  function warmup(){
    if(warmed||!("speechSynthesis" in window))return; warmed=true;
    try{ const u=new SpeechSynthesisUtterance(""); u.volume=0; u.lang="ja-JP"; speechSynthesis.speak(u); }catch(e){}
    pick();
  }
  document.addEventListener("pointerdown",warmup,{passive:true,once:true});
  document.addEventListener("touchstart",warmup,{passive:true,once:true});
  let btnEl=null;
  function speak(text,{rate=0.86,onend=null}={}){
    if(!("speechSynthesis" in window)){ if(onend)onend(); return; }
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP"; if(jaVoice)u.voice=jaVoice; u.rate=rate; u.pitch=1.06;
    if(btnEl)btnEl.classList.add("talking");
    u.onend=u.onerror=()=>{ if(btnEl)btnEl.classList.remove("talking"); if(onend)onend(); };
    speechSynthesis.speak(u);
  }
  return { speak, stop:()=>{ if("speechSynthesis" in window) speechSynthesis.cancel(); if(btnEl)btnEl.classList.remove("talking"); },
    bindButton(el){ btnEl=el; } };
})();

/* ---- クイズ(よみ・えらび) ---- */
function makeDots(container,total){ container.innerHTML="";
  for(let i=0;i<total;i++){ const d=document.createElement("span"); d.className="dot"; container.appendChild(d);} }
function setDots(container,done){ [...container.children].forEach((d,i)=>{
  d.classList.toggle("done",i<done); d.classList.toggle("now",i===done); }); }

async function runQuiz(step,chars,dots,opts={}){
  show("#scr-quiz");
  Voice.bindButton($("#q-sound"));
  $("#q-step").textContent = opts.label||(step==="yomi"?"よみ":"えらび");
  const queue=(opts.ordered?chars.slice():shuffle(chars)).map(c=>({c,requeues:0}));
  const dotsEl=$("#q-dots");
  makeDots(dotsEl,dots.total); setDots(dotsEl,dots.done);
  let consecType=null,consecN=0;
  while(queue.length){
    const item=queue.shift();
    if(opts.naritachi) await naritachiIntro(item.c);
    const r=await askQuestion(step,item.c,opts.naritachi?{withPict:true}:{});
    if(r.errType){ if(r.errType===consecType)consecN++; else {consecType=r.errType;consecN=1;}
      if(consecN>=3){ await reviewPause(item.c); consecN=0; consecType=null; } }
    else { consecType=null; consecN=0; }
    if(!r.ok && item.requeues<1){   /* 間違えは1回だけ再出題(8問+α) */
      item.requeues++; dots.total++; makeDots(dotsEl,dots.total);
      queue.splice(Math.min(2,queue.length),0,item);
    }
    dots.done++; setDots(dotsEl,dots.done);
    await wait(500);
  }
}

function askQuestion(step,char,qopts={}){
  return new Promise(res=>{
    const k=KANJI[char], main=$("#q-main"), row=$("#q-choices");

          <div class="card" style="padding:14px;">${pictSVG(k.pict,200)}</div>

      }else{
        main.innerHTML=`<div id="q-kanji" class="card">${char}</div>`;
      }
      opts=qopts.withPict?shuffle([k.yomi,...k.d1]):shuffle([k.yomi,...k.d1,...(k.d1x||[])]); correctVal=k.yomi;
      prompt=()=>Voice.speak("この かんじは なんて よむ?");
    }else{
      main.innerHTML=`<div id="q-pict" class="card" style="padding:20px;">${pictSVG(k.pict,300)}</div>`;
      opts=shuffle([char,...k.d2]); correctVal=char;

    row.innerHTML=opts.map(o=>`<button class="choice ${step==="erabi"?"kchoice":""}">${o}</button>`).join("");
    $("#q-sound").onclick=()=>{ Snd.tap(); prompt(); };
    prompt();
    const L=logOf(char)[step];
    [...row.children].forEach(btn=>{
      btn.addEventListener("click",async()=>{
        Snd.pick(); L.tries++;
        if(btn.textContent===correctVal){
          btn.classList.add("correct"); fxCorrect(false);
          if(qopts.withPict){ Voice.speak(`せいかい!${k.tale}`); await wait(2000); }
          else { Voice.speak(errors===0?"せいかい!すごい!":"せいかい!できたね!"); await wait(1300); }
          res({ok:errors===0,errType});
          return;
        }
        errors++; errType=(step==="yomi")?"yomi":"katachi";
        L.errs.push({pick:btn.textContent});
        btn.classList.add("oshii"); fxOshii();
        setTimeout(()=>{btn.classList.remove("oshii");btn.classList.add("dim");},450);
        if(errors===1){
          Voice.speak(step==="yomi"?"おしい!もういちど よくみて えらんでね。":"おしい!よくみてね。どこが ちがうかな?");
        }else if(errors===2){
          if(step==="erabi") await showCompare(char,btn.textContent);
          else { main.innerHTML=`<div style="display:flex;align-items:center;gap:30px;"><div id="q-kanji" class="card">${char}</div><div class="card" style="padding:16px;">${pictSVG(k.pict,220)}</div></div>`;
                 Voice.speak(`ヒントだよ。${k.tale}`); }
        }else{
          await showWalkthrough(char,step);
          res({ok:false,errType});
        }
      });
    });
  });
}

/* ================= なぞり書き ================= */
const T_SCALE=4.6, T_OFF=30, NS="http://www.w3.org/2000/svg";
const tp=p=>[p[0]*T_SCALE+T_OFF, p[1]*T_SCALE+T_OFF];
function polyPath(poly){
  const p=poly.map(tp), n=p.length;
  const pt=q=>q[0].toFixed(1)+" "+q[1].toFixed(1);
  if(n===2) return `M${pt(p[0])} L${pt(p[1])}`;
  let d=`M${pt(p[0])}`;
  for(let i=1;i<n-1;i++){
    const a=p[i-1],b=p[i],c=p[i+1];
    const v1=[b[0]-a[0],b[1]-a[1]], v2=[c[0]-b[0],c[1]-b[1]];
    const dot=v1[0]*v2[0]+v1[1]*v2[1];
    const mag=Math.hypot(...v1)*Math.hypot(...v2)||1;
    const turn=Math.acos(Math.max(-1,Math.min(1,dot/mag)));
    if(turn>1.05){ d+=` L${pt(b)}`; }                 /* 折れ・はねは角を残す */
    else{ const m1=[(a[0]+b[0])/2,(a[1]+b[1])/2], m2=[(b[0]+c[0])/2,(b[1]+c[1])/2];
      d+=` L${pt(m1)} Q${pt(b)} ${pt(m2)}`; }          /* はらいは曲線で */
  }
  d+=` L${pt(p[n-1])}`;
  return d;
}
function resample(poly,step){
  const pts=poly.map(tp), out=[pts[0]]; let rem=step;
  for(let i=1;i<pts.length;i++){
    let ax=pts[i-1][0],ay=pts[i-1][1],bx=pts[i][0],by=pts[i][1];
    let seg=Math.hypot(bx-ax,by-ay), t=0;
    while(t+rem<seg){ t+=rem; rem=step;
      out.push([ax+(bx-ax)*t/seg, ay+(by-ay)*t/seg]); }
    rem-=(seg-t);
  }
  out.push(pts[pts.length-1]); return out;
}
const dist=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);

async function runTraceAll(chars){
  show("#scr-trace");
  Voice.bindButton($("#t-sound"));
  const dots=$("#t-dots"); makeDots(dots,chars.length);
  for(let i=0;i<chars.length;i++){
    setDots(dots,i);
    await traceKanji(chars[i]);
    setDots(dots,i+1);
    await wait(600);
  }
}

function traceKanji(char){
  return new Promise(res=>{
    const k=KANJI[char], svg=$("#trace-svg"), box=$("#trace-svgbox");
    const strokes=k.strokes.map(p=>resample(p,7));
    let cur=0, miss=0, tol=64, live=null, prog=0, off=0, drawing=false, lastPt=null;
    const inked=[];               // 書き終えたユーザーの軌跡(自分のインク)
    $("#trace-word").textContent=k.yomi;
    const say=()=>Voice.speak(`「${k.yomi}」を なぞって かこう。みどりの まるから はじめてね。`);
    $("#t-sound").onclick=()=>{ Snd.tap(); say(); };
    const L=logOf(char).nazori;
    function render(){
      $("#trace-count").textContent=`${Math.min(cur+1,k.strokes.length)}かくめ / ${k.strokes.length}かく`;
      let html="";
      // 下敷き: フォント品質のきれいな字形(これをなぞる)
      html+=glyphImage(char,"glyph-ghost-img");
      // 書き終えた画: ユーザー自身の なぞりインクを残す
      inked.forEach(d=>{ html+=`<path class="stk-ink" d="${d}"/>`; });
      // これから書く画の始点マーカー
      if(cur<k.strokes.length){
        const s=tp(k.strokes[cur][0]);
        html+=`<circle class="start-dot" cx="${s[0]}" cy="${s[1]}" r="18"/>
               <text class="start-num" x="${s[0]}" y="${s[1]}">${cur+1}</text>`;
      }
      svg.innerHTML=html;
    }
    function toSvg(ev){ const r=svg.getBoundingClientRect();
      return [(ev.clientX-r.left)*520/r.width,(ev.clientY-r.top)*520/r.height]; }
    function demoStroke(){
      const p=document.createElementNS(NS,"path");
      p.setAttribute("class","stk-demo"); p.setAttribute("d",polyPath(k.strokes[cur]));
      svg.appendChild(p);
      const len=p.getTotalLength();
      p.style.strokeDasharray=len; p.style.strokeDashoffset=len;
      p.style.transition="stroke-dashoffset 1.1s ease";
      requestAnimationFrame(()=>{ p.style.strokeDashoffset=0; });
      Voice.speak("おてほんだよ。みどりの まるから この むきに かくよ。");
      setTimeout(()=>p.remove(),2200);
    }
    $("#btn-otehon").onclick=()=>{ Snd.tap(); if(cur<k.strokes.length) demoStroke(); };
    $("#btn-kakinaosu").onclick=()=>{ Snd.tap(); cur=0; miss=0; tol=64; inked.length=0; render(); };
    function down(ev){
      if(cur>=k.strokes.length) return;
      const pt=toSvg(ev);
      const startOK=strokes[cur].slice(0,5).some(p=>dist(p,pt)<=tol+22);
      if(!startOK){
        const wrongJun=k.strokes.some((s,j)=>j!==cur && dist(tp(s[0]),pt)<=tol);
        if(wrongJun){ L.junErr++; fxOshii();
          Voice.speak(`かくじゅんばんが ちがうよ。${cur+1}ばんの みどりの まるから かこう。`); }
        else Voice.speak("みどりの まるから はじめよう。");
        return;
      }
      drawing=true; prog=0; off=0; lastPt=pt;
      live=document.createElementNS(NS,"path");
      live.setAttribute("class","stk-live");
      live.setAttribute("d",`M${pt[0]} ${pt[1]}`);
      svg.appendChild(live);
      try{ if(ev.pointerId!==undefined && box.setPointerCapture) box.setPointerCapture(ev.pointerId); }catch(e){}
    }
    function move(ev){
      if(!drawing) return;
      const pt=toSvg(ev); lastPt=pt;
      live.setAttribute("d",live.getAttribute("d")+` L${pt[0].toFixed(1)} ${pt[1].toFixed(1)}`);
      const pts=strokes[cur];
      let best=1e9,bi=prog;
      for(let i=Math.max(0,prog-3);i<=Math.min(pts.length-1,prog+14);i++){
        const d=dist(pts[i],pt); if(d<best){best=d;bi=i;}
      }
      if(best<=tol){ prog=Math.max(prog,bi); }
      else if(best>tol*2.2){ off++; }
    }
    function up(){
      if(!drawing) return; drawing=false;
      const pts=strokes[cur];
      const nearEnd=lastPt && dist(pts[pts.length-1],lastPt)<=tol*1.2;
      const okEnd=prog>=Math.floor(pts.length*0.72) || (nearEnd && prog>=Math.floor(pts.length*0.55));
      if(okEnd){
        inked.push(live.getAttribute("d"));   // 自分のなぞり跡を保存
        live.remove(); cur++; miss=0; Snd.strokeOk(); render();
        if(cur>=k.strokes.length){
          // 仕上げ: フォント品質のきれいな字がすっと浮かび上がる
          svg.innerHTML=glyphImage(char,"glyph-final-img");
          fxCorrect(true);
          Voice.speak(`できた!「${char}」が かけたね!`);
          box.onpointerdown=box.onpointermove=box.onpointerup=null;
          setTimeout(res,1700);
        }
      }else{
        miss++; L.miss++; tol=Math.min(tol+8,100);
        live.style.transition="opacity .5s"; live.style.opacity="0";
        const l=live; setTimeout(()=>l.remove(),550);
        fxOshii();
        if(miss>=2){ demoStroke(); miss=0; }
        else Voice.speak("ゆっくりで いいよ。うすい じの うえを なぞろう。");
      }
    }
    box.onpointerdown=down; box.onpointermove=move;
    box.onpointerup=up; box.onpointerleave=up;
    render(); say();
  });
}

/* ================= けっか・ずかん・保護者サマリ ================= */
function finishSet(){
  curSet.chars.forEach(c=>{ if(!state.bloomed.has(c)){ state.bloomed.add(c); state.newly.add(c);} });
  state.clearedSets.add(state.setIdx);
  state.sessionsRow++;
  show("#scr-result");
  $("#result-stamp").innerHTML=`
    <g>${flowerSVG("#F5A623","#F0803C",100,100,80)}</g>
    <path d="M100 40 C 140 36 158 66 156 100 C 154 138 128 158 98 158 C 62 158 44 132 44 100 C 44 66 68 42 100 40 C 122 39 140 50 148 64"
      fill="none" stroke="#E86A6A" stroke-width="9" stroke-linecap="round" opacity=".9"/>`;
  $("#result-msg").textContent=`「${curSet.name}」の はなが さいたよ!`;
  Snd.stamp(); setTimeout(()=>Snd.fanfare(),300);
  Voice.speak("よくできました!かんじの はなが さいたよ!");
  if(state.sessionsRow>=2){ setTimeout(()=>{ overlay("#ovl-break"); Voice.speak("きゅうけいしよう!"); },2500); }
}
$("#break-close").addEventListener("click",()=>{ Snd.tap(); state.sessionsRow=0; overlay("#ovl-break",false); });
$("#btn-again").addEventListener("click",()=>{ Snd.tap(); renderSets(); show("#scr-sets"); });

function flowerSVG(c1,c2,cx,cy,r){
  let petals="";
  for(let i=0;i<6;i++){ const a=i*60*Math.PI/180;
    petals+=`<ellipse cx="${cx+Math.cos(a)*r*0.55}" cy="${cy+Math.sin(a)*r*0.55}" rx="${r*0.34}" ry="${r*0.22}"
      transform="rotate(${i*60} ${cx+Math.cos(a)*r*0.55} ${cy+Math.sin(a)*r*0.55})" fill="${c1}"/>`; }
  return petals+`<circle cx="${cx}" cy="${cy}" r="${r*0.3}" fill="${c2}"/>`;
}
function renderZukan(){
  const g=$("#zukan-grid"); g.innerHTML="";
  ALL_CHARS.forEach(c=>{
    const b=state.bloomed.has(c), n=state.newly.has(c);
    const cell=document.createElement("button");
    cell.type="button";
    cell.className="z-cell "+(b?("bloom"+(n?" newly":"")):"seed");
    cell.setAttribute("aria-label",`${c}（${KANJI[c].yomi}）を れんしゅうする`);
    cell.innerHTML=`<div class="flower">${b?`<svg viewBox="0 0 100 100">${flowerSVG("#FBD489","#F5A623",50,50,46)}</svg>`:""}
      <span class="zk">${c}</span></div><div class="zy">${KANJI[c].yomi}</div>`;
    cell.addEventListener("click",()=>{ Snd.tap(); startZukanPractice(c); });
    g.appendChild(cell);
  });
  if(state.newly.size) Snd.bloom();
  state.newly.clear();
}

/* 図鑑から選んだ1字だけを、絵・読み・書き順の順で練習 */
let zukanPracticeRunning=false;
async function startZukanPractice(char){
  if(zukanPracticeRunning) return;
  zukanPracticeRunning=true;
  Voice.stop(); overlay("#ovl-zukan",false);
  try{
    const dots={total:2,done:0};
    await runQuiz("yomi",[char],dots,{naritachi:true,ordered:true,label:"① えと よみ"});
    await runQuiz("erabi",[char],dots,{ordered:true,label:"② えから かんじ"});
    await runTraceAll([char]);
    if(!state.bloomed.has(char)) state.newly.add(char);
    state.bloomed.add(char);
    renderSets(); show("#scr-sets");
    openZukan();
    Voice.speak(`「${KANJI[char].yomi}」の れんしゅうが できたね!`);
  }finally{
    zukanPracticeRunning=false;
  }
}
function renderParent(){
  let rows="";
  curSet.chars.forEach(c=>{
    const L=state.log[c]||{};
    const cell=(st,label)=>{
      const d=L[st]; if(!d||!d.tries&&st!=="nazori") return "－";
      if(st==="nazori"){ const parts=[];
        if(d.junErr) parts.push(`筆順の迷い${d.junErr}回`);
        if(d.miss>=3) parts.push(`なぞり直し${d.miss}回`);
        return parts.length?`<span class="ng">${parts.join("、")}</span>`:"◎"; }
      if(!d.errs.length) return "◎";
      const picks=[...new Set(d.errs.map(e=>e.pick))].join("」「");
      return `<span class="ng">「${picks}」と迷いました(${d.errs.length}回)</span>`;
    };
    rows+=`<tr><td style="font-family:var(--kyokasho);font-size:34px;">${c}</td>
      <td>${cell("yomi")}</td><td>${cell("nazori")}</td></tr>`;
  });
  $("#parent-body").innerHTML=`
    <p>◎=つまずきなし。誤答は罰せず、ヒント→一緒に確認→再挑戦の順で進めています。</p>
    <table><tr><th>漢字</th><th>よみ(なりたち+ふつう)</th><th>なぞり</th></tr>${rows}</table>
    <p style="margin-top:12px;">迷いのあった字は、次回のセッションでもう一度出題するのがおすすめです。</p>`;
}
