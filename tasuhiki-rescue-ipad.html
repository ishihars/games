  #rhythmModal h1{font-size:20px;font-weight:600;letter-spacing:.04em;margin:2px 2px 12px;
    display:flex;align-items:center;gap:8px;}
  #rhythmModal h1 .tag{font-size:11px;font-weight:500;color:#8C8577;background:#FBF8F1;
    border:1px solid #E4DDCE;padding:3px 8px;border-radius:999px;}
  #rhythmModal .hud{display:flex;gap:10px;margin:0 0 12px;}
  #rhythmModal .stat{flex:1;background:#FBF8F1;border:1px solid #E4DDCE;border-radius:12px;padding:10px 14px;}
  #rhythmModal .stat .lbl{font-size:12px;color:#8C8577;}

  #rhythmModal .board{position:relative;background:#FBF8F1;border:1px solid #E4DDCE;
    border-radius:12px;overflow:hidden;cursor:pointer;user-select:none;touch-action:manipulation;}
  #rhythmModal svg{display:block;width:100%;height:auto;}
  #rhythmModal .ovl{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;background:rgba(30,26,20,.42);padding:20px;text-align:center;}
  #rhythmModal .ovl .ttl{font-size:26px;font-weight:600;color:#fff;}
  #rhythmModal .ovl .sub{font-size:14px;color:#fff;line-height:1.7;}
  #rhythmModal .ovl .rank{font-size:28px;font-weight:600;}
  #rhythmModal .btn{font-size:16px;font-weight:600;padding:11px 30px;border:none;
    border-radius:10px;cursor:pointer;background:#fff;color:#3A342B;touch-action:manipulation;}
  #rhythmModal .btn.go{background:#1D9E75;color:#fff;}
  #rhythmModal .foot{margin:12px 2px 0;font-size:12px;color:#8C8577;line-height:1.7;}
</style>

<div id="stage"><canvas id="c" width="800" height="600"></canvas></div>

<script>
/* ===== ボーナス:うさぎのもちつき(モジュール化 / window.MochiGame.launch(onDone)) ===== */
window.MochiGame = (function(){
  const NS='http://www.w3.org/2000/svg';
  const modal=document.getElementById('rhythmModal');
  const svg=document.getElementById('scene');
  const board=document.getElementById('board');
  const overlay=document.getElementById('overlay');
  const kine=document.getElementById('kine');
  const mochi=document.getElementById('mochi');
  const judgeT=document.getElementById('judge');
  const scoreV=document.getElementById('scoreV');
  const comboV=document.getElementById('comboV');
  const leftV=document.getElementById('leftV');

  const BPM=112, BEAT=60/BPM;
  // 基本の譜面(導入+助走+本番の乗り)。全パターン共通の入り口として毎回使う。
  const BASE_NOTES=[4,6,8,10,12,13,14,15,16,17,18,19,21,21.5,23,23.5,25,25.5,27,27.5,29,31];
  // 2回目以降に追加する「3拍打つ(3連打)」パート
  const TRIPLE_NOTES=[33,33.5,34, 36,36.5,37, 39,39.5,40, 42,42.5,43, 45,45.5,46];
  // 3回目に追加する「裏拍子(オフビートのみ)」パート
  const BACKBEAT_NOTES=[48.5,49.5,50.5,51.5,52.5,53.5,54.5,55.5,56.5,57.5,58.5,59.5];
  const PATTERNS=[
    { notes: BASE_NOTES, end: 33,
      title:'うさぎのもちつき', sub:'おもちが うすに おちる しゅんかんに タップ!<br>スペースキーでもOK' },
    { notes: [...BASE_NOTES, ...TRIPLE_NOTES, 47.5,49.5], end: 51.5,
      title:'うさぎのもちつき 2かいめ', sub:'ちょっと ながく なったよ！<br>「タタタン」と 3かい つづけて たたく ところに ちゅうい！' },
    { notes: [...BASE_NOTES, ...TRIPLE_NOTES, ...BACKBEAT_NOTES, 61,63], end: 65,
      title:'うさぎのもちつき 3かいめ', sub:'もっと ながいよ！<br>あとから「ドン」じゃなく「タ」で うつ うらびょうしにも ちょうせん！' },
  ];
  let playCount = 0; // 何回このボーナスを遊んだか(ページを開いている間だけ数える)
  let NOTE_BEATS = PATTERNS[0].notes, END_BEAT = PATTERNS[0].end;
  function introHtmlFor(idx){
    const p = PATTERNS[idx];
    return '<div class="ttl">'+p.title+'</div>'+
      '<div class="sub">'+p.sub+'</div>'+
      '<button class="btn go" id="startB">スタート</button>';
  }

  let ctx=null,startT=0,playing=false,notes=[],score=0,combo=0,maxCombo=0,nextTick=0,raf=0,_onDone=null;

  function blip(t,f1,f2,dur,type,g){
    const o=ctx.createOscillator(),ga=ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(f1,t);
    if(f2!==f1)o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    ga.gain.setValueAtTime(g,t); ga.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(ga); ga.connect(ctx.destination); o.start(t); o.stop(t+dur+0.02);
  }
  const sTick=(t,down)=>blip(t,down?1500:1000,down?1500:1000,0.04,'square',0.05);
  const sToss=(t)=>blip(t,420,880,0.14,'sine',0.16);
  const sHit=(t,p)=>{blip(t,p?880:660,p?880:660,0.09,'triangle',0.3);if(p)blip(t+0.05,1320,1320,0.1,'triangle',0.22);};
  const sMiss=(t)=>blip(t,160,90,0.22,'sawtooth',0.2);
  const sWhiff=(t)=>blip(t,300,220,0.06,'square',0.08);

  const beatTime=(b)=>startT+b*BEAT;
  function makeBall(){
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('r','13'); c.setAttribute('fill','#FFFFFF');
    c.setAttribute('stroke','#B4B2A9'); c.setAttribute('stroke-width','2');
    c.setAttribute('cx','-50'); c.setAttribute('cy','-50');
    svg.appendChild(c); return c;
  }
  function setup(){
    document.getElementById('balls').innerHTML='';
    notes=NOTE_BEATS.map(b=>({beat:b,el:makeBall(),tossed:false,tossSnd:false,judged:false}));
    score=0;combo=0;maxCombo=0;nextTick=0;
    scoreV.textContent='0'; comboV.textContent='0'; leftV.textContent=String(notes.length);
    mochi.setAttribute('ry','9'); mochi.setAttribute('rx','36');
  }
  function start(idx){
    if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)();
    ctx.resume();
    const pattern = PATTERNS[idx];
    NOTE_BEATS = pattern.notes; END_BEAT = pattern.end;
    setup();
    startT=ctx.currentTime+0.6;
    notes.forEach(n=>{n.land=beatTime(n.beat);n.toss=beatTime(n.beat-1);});
    playing=true; overlay.style.display='none';
    playCount++; // 次にボーナスへ来た時は次の段階の譜面にする
    raf=requestAnimationFrame(loop);
  }
  function showJudge(txt,color){
    judgeT.textContent=txt; judgeT.setAttribute('fill',color);
    judgeT.setAttribute('opacity','1'); judgeT.setAttribute('y','120');
    const t0=performance.now();
    (function fade(){
      const p=(performance.now()-t0)/600;
      if(p>=1){judgeT.setAttribute('opacity','0');return;}
      judgeT.setAttribute('opacity',String(1-p));
      judgeT.setAttribute('y',String(120-20*p));
      requestAnimationFrame(fade);
    })();
  }
  function swing(){
    kine.setAttribute('transform','rotate(46 470 186)');
    setTimeout(()=>kine.setAttribute('transform','rotate(0 470 186)'),110);
  }
  function grow(){
    const ry=Math.min(20,parseFloat(mochi.getAttribute('ry'))+0.5);
    mochi.setAttribute('ry',String(ry));
    mochi.setAttribute('rx',String(Math.min(44,36+(ry-9))));
  }
  function updateHud(){
    scoreV.textContent=String(score); comboV.textContent=String(combo);
    leftV.textContent=String(notes.filter(n=>!n.judged).length);
  }
  function judgeNote(n,grade){
    n.judged=true; n.el.setAttribute('opacity','0');
    if(grade==='p'){score+=100;combo++;sHit(ctx.currentTime,true);showJudge('ぴったり!','#1D9E75');grow();}
    else if(grade==='g'){score+=50;combo++;sHit(ctx.currentTime,false);showJudge('まずまず','#BA7517');grow();}
    else{combo=0;sMiss(ctx.currentTime);showJudge('あちゃー…','#A32D2D');}
    maxCombo=Math.max(maxCombo,combo); updateHud();
  }
  function press(){
    if(!playing)return;
    swing();
    const now=ctx.currentTime;
    let best=null,bd=1;
    notes.forEach(n=>{if(n.judged)return;const d=Math.abs(now-n.land);if(d<bd){bd=d;best=n;}});
    if(best&&bd<=0.18){judgeNote(best,bd<=0.075?'p':'g');}
    else{if(combo>0){combo=0;updateHud();}sWhiff(now);}
  }
  function loop(){
    const now=ctx.currentTime;
    while(nextTick<END_BEAT&&beatTime(nextTick)<now+0.2){sTick(beatTime(nextTick),nextTick%4===0);nextTick++;}
    notes.forEach(n=>{
      if(!n.tossSnd&&n.toss<now+0.2){n.tossSnd=true;sToss(n.toss);}
      if(!n.tossed&&now>=n.toss)n.tossed=true;
      if(n.tossed&&!n.judged){
        const p=Math.min(1.15,(now-n.toss)/BEAT);
        const x=140+180*p;
        const y=170+34*p-135*Math.sin(Math.PI*Math.min(1,p));
        n.el.setAttribute('cx',String(x)); n.el.setAttribute('cy',String(y));
        if(now>n.land+0.18)judgeNote(n,'m');
      }
    });
    if(now>beatTime(END_BEAT)){finish();return;}
    raf=requestAnimationFrame(loop);
  }
  function finish(){
    playing=false; cancelAnimationFrame(raf);
    const ratio=score/(NOTE_BEATS.length*100);
    const rank=ratio>=0.85?'たいへんよくできました!':ratio>=0.55?'まずまず':'もういちど…';
    const rc=ratio>=0.85?'#9FE1CB':ratio>=0.55?'#FAC775':'#F7C1C1';
    overlay.innerHTML='<div class="sub">けっか</div>'+
      '<div class="rank" style="color:'+rc+';">'+rank+'</div>'+
      '<div class="sub">スコア '+score+' ／ さいだいコンボ '+maxCombo+'</div>'+
      '<button class="btn go" id="backB">もどる</button>';
    overlay.style.display='flex';
    document.getElementById('backB').addEventListener('click',e=>{e.stopPropagation(); close();});
  }
  function close(){
    playing=false; cancelAnimationFrame(raf);
    modal.style.display='none';
    const cb=_onDone; _onDone=null;
    if(cb) cb();
  }

  board.addEventListener('pointerdown',()=>{ if(playing)press(); });
  window.addEventListener('keydown',e=>{
    if(e.code==='Space'&&playing&&!e.repeat){ e.preventDefault(); press(); }
  });

  function launch(onDone){
    _onDone=onDone||null;
    const idx = Math.min(playCount, PATTERNS.length-1);
    overlay.innerHTML=introHtmlFor(idx);
    overlay.style.display='flex';
    const sb=document.getElementById('startB');
    sb.addEventListener('click',e=>{ e.stopPropagation(); start(idx); });
    modal.style.display='flex';
  }
  return { launch };
})();
</script>
<script>
(() => {
"use strict";
const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const W = 800, H = 600;

/* ---------- iPad対応: 画面サイズにフィット + Retina高解像度描画 ---------- */
function resizeCanvas(){
  // レイアウト前などで取得に失敗した場合の保険(documentElementのサイズもフォールバックに使う)
  const availW = window.innerWidth || document.documentElement.clientWidth || 800;
  const availH = window.innerHeight || document.documentElement.clientHeight || 600;
  if(availW < 50 || availH < 50) return; // まだ正しく測れていない時は何もしない(次のタイミングで再試行される)
  const scale = Math.min(availW / W, availH / H);
  const cssW = Math.max(280, Math.floor(W * scale)), cssH = Math.max(210, Math.floor(H * scale));
  cv.style.width = cssW + "px";
  cv.style.height = cssH + "px";
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  cv.width = Math.floor(W * dpr);
  cv.height = Math.floor(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 論理座標(800x600)のまま描画できるようにする
}
resizeCanvas();
// 読み込みタイミングによってはinnerWidth/Heightがまだ確定していないことがあるため、複数回リトライする
window.addEventListener("load", resizeCanvas);
setTimeout(resizeCanvas, 50);
setTimeout(resizeCanvas, 300);
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", ()=>setTimeout(resizeCanvas, 250));
// iPadでのバウンス/ピンチズーム/二本指スクロールを防止(ゲーム画面はタップ操作のみのため)
document.addEventListener("touchmove", e=>{ e.preventDefault(); }, {passive:false});
document.addEventListener("gesturestart", e=>{ e.preventDefault(); });


/* ---------- キャラクター画像(恐竜、透過PNG / base64埋め込み・外部ファイルなし) ---------- */
/* ---------- キャラクター画像(恐竜4種、透過PNG / base64埋め込み・外部ファイルなし) ---------- */
/* ---------- キャラクター画像(炎ブレス恐竜、歩行4枚+火吹き4枚 / base64埋め込み・外部ファイルなし) ---------- */
const WALK_FRAMES = [];
const FIRE_FRAMES = [];

/* ---------- サウンド(Web Audio 生成 / 外部ファイルなし) ---------- */
let AC = null, master = null, sfxBus = null, bgmBus = null, muted = false;
function ac(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.9; master.connect(AC.destination);
    sfxBus = AC.createGain(); sfxBus.gain.value = 1.0; sfxBus.connect(master);
    bgmBus = AC.createGain(); bgmBus.gain.value = 0.42; bgmBus.connect(master);
  }
  if(AC.state === "suspended") AC.resume();
  return AC;
}
// 1音(バス指定・軽いディチューン重ねで厚みを出せる)
function tone(freq, dur, type="sine", vol=0.2, when=0, bus, detune=0, glideTo=0){
  if(muted) return;
  const a = ac(); const t = a.currentTime + when;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t+dur);
  if(detune) o.detune.value = detune;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g).connect(bus || sfxBus); o.start(t); o.stop(t+dur+0.03);
}
// 弾む音(2オシで少しリッチに)
function blip(freq, dur, vol, when=0){ tone(freq,dur,"triangle",vol,when); tone(freq,dur,"square",vol*0.35,when,null,6); }

const sfx = {
  // 正解:上へ駆け上がるアルペジオ(連続正解 streak で高くなる)
  correct(streak=0){
    const base = [523,659,784,1046,1318]; // C E G C E
    const lift = Math.min(streak,3)*40;
    base.forEach((f,i)=> blip(f+lift, 0.14, 0.22, i*0.045));
    tone(base[base.length-1]+lift, 0.2, "sine", 0.14, base.length*0.045); // きらっと余韻
  },
  // 星:キラキラ上昇グリッサンド
  star(){ tone(1046,0.14,"sine",0.16,0,null,0,2093); tone(1568,0.12,"triangle",0.12,0.05); },
  // 不正解:責めない「ぽよん」(やわらかく下がる)
  wrong(){ tone(440,0.16,"sine",0.16,0,null,0,300); tone(660,0.1,"triangle",0.08,0.02); },
  // タップ:軽いポップ
  tap(){ tone(720,0.05,"triangle",0.09,0,null,0,900); },
  // クリア:ファンファーレ
  clear(){
    const mel=[523,659,784,1046,784,1046,1318];
    mel.forEach((f,i)=> blip(f,0.24,0.2,i*0.13));
    tone(1568,0.5,"sine",0.14,mel.length*0.13);
  },
  confetti(){ [1318,1568,2093].forEach((f,i)=> tone(f,0.1,"sine",0.12,i*0.05)); }
};

/* ---------- BGM(明るいループ / ルックアヘッド・スケジューラ) ---------- */
const BGM = (()=>{
  const bpm = 132, beat = 60/bpm, step = beat/2; // 8分音符
  // メロディ(0=休符)。ハ長調のはずむ2小節ループ
  const mel = [523,0,659,784, 659,0,523,0,  587,0,698,880, 784,0,659,0];
  const bass= [131,0,196,0,  131,0,196,0,   147,0,196,0,   131,0,196,0];
  let on=false, idx=0, nextT=0, timer=null;
  function note(f,when,dur,vol,type,bus){ if(f) tone(f,dur,type,vol,when,bus); }
  function schedule(){
    const a = ac(); const look = 0.12;
    while(nextT < a.currentTime + look){
      const when = nextT - a.currentTime;
      note(mel[idx], when, step*0.9, 0.16, "triangle", bgmBus);
      if(mel[idx]) note(mel[idx]*2, when, step*0.6, 0.05, "sine", bgmBus); // 上の薄いキラ
      note(bass[idx], when, step*1.1, 0.18, "sine", bgmBus);
      // 4拍ごとに軽いパーカッション(ノイズ風の短音)
      if(idx%4===0) note(1760, when, 0.03, 0.05, "square", bgmBus);
      idx = (idx+1) % mel.length;
      nextT += step;
    }
  }
  return {
    start(){ if(on||muted) return; on=true; const a=ac(); nextT=a.currentTime+0.05; idx=0;
      timer=setInterval(schedule, 40); },
    stop(){ on=false; if(timer){ clearInterval(timer); timer=null; } },
    get playing(){ return on; }
  };
})();

document.getElementById("mute").onclick = (e)=>{
  muted = !muted;
  e.target.textContent = muted ? "🔇" : "🔊";
  if(muted){ BGM.stop(); }
  else { ac(); sfx.tap(); BGM.start(); }
};

/* ---------- 入力(タップ/クリック + キーボード) ---------- */
const pointer = {x:0,y:0,down:false};
function toCanvas(clientX, clientY){
  const r = cv.getBoundingClientRect();
  return { x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height) };
}
function press(clientX, clientY){
  if(bonusActive) return; // もちつき中は本編のタップを無視
  ac(); if(!muted && !BGM.playing) BGM.start();
  const p = toCanvas(clientX, clientY); pointer.x=p.x; pointer.y=p.y; pointer.down=true; handleTap(p.x,p.y);
}
cv.addEventListener("mousedown", e=>press(e.clientX,e.clientY));
cv.addEventListener("touchstart", e=>{ e.preventDefault(); const t=e.changedTouches[0]; press(t.clientX,t.clientY); }, {passive:false});
window.addEventListener("keydown", e=>{
  if(bonusActive) return; // もちつき中は本編のキーを無視(もちつき側が処理)
  ac(); if(!muted && !BGM.playing) BGM.start();
  if(state==="TITLE"){ if(e.key==="1") startGame("ADD"); if(e.key==="2") startGame("SUB"); return; }
  if(state==="CLEAR"){
    if(e.key===" "||e.key==="Enter"){
      if(!bonusUsed){ bonusUsed=true; launchBonus(); } else { goTitle(); }
    }
    return;
  }
  if(state==="PLAY"){
    if(e.key==="Escape"){ goTitle(); return; }
    if(feedback && feedback.type==="good") return; // 正解演出中はロック
    if(e.key>="0" && e.key<="9"){ appendDigit(e.key); }
    else if(e.key==="Backspace"){ backspaceDigit(); }
    else if(e.key==="Enter"){ submitAnswer(); }
    else if(e.key.toLowerCase()==="h"){ hintOn=!hintOn; sfx.tap(); }
  }
});

/* ---------- ゲーム状態 ---------- */
let state = "TITLE";       // TITLE / PLAY / CLEAR
let mode = "ADD";          // ADD / SUB
const QUESTIONS_PER_STAGE = 10;
let qIndex = 0;            // 0..4
let question = null;       // {a,b,answer,op}
let rescued = 0;          // 助けた動物(=正解数、スコア尺度)
let stars = 0;            // 星の合計
let starsDisplay = 0;     // カウントアップ表示用
let streak = 0;           // 連続正解
let perfect = true;       // 全問ノーミスクリア判定
let bonusUsed = false;    // このステージでボーナスを使ったか
let bonusActive = false;  // ボーナス(もちつき)プレイ中は本編入力を止める

/* 演出タイマー(フレーム単位, 60fps基準) */
let hitStop = 0;          // ヒットストップ残フレーム
let flash = 0;            // 画面フラッシュ
let speedFrames = 0;      // 「はやいゾーン」残り(最大600=10秒)
const SPEED_MAX = 600;
let feedback = null;      // {type:"good"/"bad", frames}
let animals = [];         // ステージの動物表示
let confetti = [];        // 紙吹雪パーティクル
let starFx = [];          // 飛ぶ星
let danceT = 0;           // クリアダンス用時間
let revealFx = null;      // 正解した恐竜を大きく・弾ませて見せる演出 {index, stage, t, duration}

// 正解するごとに大きくなる(🥚→炎ブレス恐竜)。ステージ内の何問目かでサイズが決まる。
const DINO_SIZE_TIERS = [38, 42, 47, 54];
function dinoTierH(i){
  const t = Math.min(DINO_SIZE_TIERS.length-1, Math.floor(i / QUESTIONS_PER_STAGE * DINO_SIZE_TIERS.length));
  return DINO_SIZE_TIERS[t];
}
// 歩行アニメーション(常時サイクル)の状態
let walkFrameIdx = 0, walkTimer = 0;

/* ---------- 問題生成 ---------- */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
// たしざんをプレイした回数に応じて Xの十の位 を上げる(1回目:2〜9 / 2回目:10番台 / 3回目以降:20番台)
const ADD_TENS_TIERS = [0, 10, 20];
let addPlayCount = 0;
let currentAddBase = 0; // このステージ中はずっとこの十の位を使う(ステージ途中で範囲が変わらないように固定)
function makeAdd(){ // 繰り上がり保証: Xの一の位+Yが11〜18(一の位に必ずくり上がりが発生)
  let x0,b;
  do{ x0=randInt(2,9); b=randInt(2,9); }while(x0+b < 11 || x0+b > 18);
  const a = currentAddBase + x0;
  return {a,b,op:"+",answer:a+b};
}
function makeSub(){ // 繰り下がり保証: a(11-18) の一の位 < b
  let a,b;
  do{ a=randInt(11,18); b=randInt(2,9); }while(!( (a%10) < b ) || a-b<1);
  return {a,b,op:"-",answer:a-b};
}
let lastKey = "";
let hintOn = true; // ヒントはデフォルトで表示(押すと隠せる)
let typed = "";            // 入力中の数字文字列
const MAX_DIGITS = 2;      // 答えは最大18なので2桁まで
let slotWobble = 0;        // 不正解時の答えスロットの揺れ
function nextQuestion(){
  let q;
  do{ q = (mode==="ADD") ? makeAdd() : makeSub(); }while(q.a+"_"+q.b+q.op === lastKey);
  lastKey = q.a+"_"+q.b+q.op;
  question = q;
  speedFrames = SPEED_MAX;
  typed = "";
  slotWobble = 0;
  feedback = null;
}

/* ---------- フロー ---------- */
function startGame(m){
  mode = m; qIndex = 0; rescued = 0; stars = 0; starsDisplay = 0; streak = 0;
  perfect = true; bonusUsed = false;
  confetti = []; starFx = []; revealFx = null;
  if(m==="ADD"){
    currentAddBase = ADD_TENS_TIERS[Math.min(addPlayCount, ADD_TENS_TIERS.length-1)];
    addPlayCount++; // 次回たしざんを選んだ時はもう一段上がる
  }
  animals = [];
  for(let i=0;i<QUESTIONS_PER_STAGE;i++){
    animals.push({ h: dinoTierH(i), saved:false, jump:0 });
  }
  sfx.tap();
  state = "PLAY";
  nextQuestion();
}
function goTitle(){ state="TITLE"; sfx.tap(); }

const bonusBtn = {x:W/2-190,y:462,w:380,h:76};
function launchBonus(){
  BGM.stop();
  bonusActive = true;
  window.MochiGame.launch(()=>{ bonusActive = false; goTitle(); });
}

/* ---------- 数字キーパッド(タップ用)レイアウト ---------- */
// 1〜5 / 6〜0 / ⌫・けってい の3段。各行は横幅に合わせて自動で中央配置。
const KEYPAD_ROWS = [ ["1","2","3","4","5"], ["6","7","8","9","0"], ["⌫","けってい"] ];
const KEY_GAP = 12, ROW_H = 42, ROW_GAP = 5;
const KEY_START_Y = 308;
const keypad = [];
KEYPAD_ROWS.forEach((row,r)=>{
  const n = row.length;
  const colW = (n===5) ? 128 : 338; // 5列は細め、2列(⌫/けってい)は太め
  const rowW = n*colW + (n-1)*KEY_GAP;
  const startX = (W - rowW) / 2;
  const y = KEY_START_Y + r*(ROW_H+ROW_GAP);
  row.forEach((label,c)=>{
    keypad.push({
      label,
      x: startX + c*(colW+KEY_GAP),
      y, w: colW, h: ROW_H,
      kind: label==="⌫" ? "back" : (label==="けってい" ? "enter" : "digit")
    });
  });
});
const answerBox = { x:W/2-110, y:262, w:220, h:38 };
const HINT_Y = 132, HINT_H = 124;

function appendDigit(d){
  if(!question || (feedback && feedback.type==="good")) return;
  if(typed.length < MAX_DIGITS){ typed += d; sfx.tap(); }
  else sfx.tap(); // 桁数いっぱい:反応だけ返す
}
function backspaceDigit(){
  if(!question || (feedback && feedback.type==="good")) return;
  if(typed.length>0){ typed = typed.slice(0,-1); sfx.tap(); }
}
function submitAnswer(){
  if(!question || (feedback && feedback.type==="good")) return;
  if(typed.length===0){ sfx.tap(); return; } // 空では判定しない
  const val = parseInt(typed,10);
  if(val === question.answer){
    // 正解 —— ヒットストップ6f + フラッシュ、星付与
    hitStop = 6; flash = 8;
    const gained = (speedFrames>0) ? 3 : 1;
    stars += gained;
    rescued += 1; streak += 1;
    animals[qIndex].saved = true; animals[qIndex].jump = 24;
    revealFx = { index: qIndex, h: animals[qIndex].h, t: 0, duration: 40 };
    sfx.correct(streak);
    for(let s=0;s<gained;s++){
      starFx.push({ x:answerBox.x+answerBox.w/2, y:answerBox.y+answerBox.h/2, t:0, delay:s*4 });
    }
    feedback = { type:"good", frames:42, gained };
    if(streak>0 && streak%3===0){ spawnConfetti(); sfx.confetti(); }
  }else{
    // 不正解 —— 減点なし・止めない。答え欄がぷるぷる+やさしい音
    slotWobble = 8;
    streak = 0;
    perfect = false;
    sfx.wrong();
    feedback = { type:"bad", frames:14 };
  }
}

function handleTap(x,y){
  if(state==="TITLE"){
    if(inRect(x,y,titleBtns.add)) startGame("ADD");
    else if(inRect(x,y,titleBtns.sub)) startGame("SUB");
    else sfx.tap();
    return;
  }
  if(state==="CLEAR"){
    if(!bonusUsed){
      // ボーナスが遊べる間は、うっかり別の場所を押しても次へ行かない
      if(inRect(x,y,bonusBtn)){ bonusUsed=true; launchBonus(); }
      else sfx.tap();
    } else {
      goTitle();
    }
    return;
  }
  if(state==="PLAY"){
    if(inRect(x,y,menuBtn)){ goTitle(); return; }
    if(feedback && feedback.type==="good") return; // 正解演出中はロック
    if(inRect(x,y,hintBtn)){ hintOn=!hintOn; sfx.tap(); return; }
    for(const k of keypad){
      if(inRect(x,y,k)){
        if(k.kind==="digit") appendDigit(k.label);
        else if(k.kind==="back") backspaceDigit();
        else if(k.kind==="enter") submitAnswer();
        return;
      }
    }
    sfx.tap(); // ノーリアクション排除:どこを押しても最低限反応
  }
}
function inRect(x,y,r){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }

function advance(){
  qIndex++;
  if(qIndex >= QUESTIONS_PER_STAGE){
    state = "CLEAR"; danceT = 0; spawnConfetti(); spawnConfetti(); sfx.clear();
  }else{
    nextQuestion();
  }
}

/* ---------- パーティクル ---------- */
function spawnConfetti(){
  const cols = ["#ff8fab","#9ad0ec","#ffd166","#7bd16b","#ff7b54","#c792ea"];
  for(let i=0;i<40;i++){
    confetti.push({ x:randInt(0,W), y:-20-randInt(0,120), vx:(Math.random()-0.5)*2,
      vy:2+Math.random()*3, r:randInt(5,10), col:cols[randInt(0,cols.length-1)],
      rot:Math.random()*6, vr:(Math.random()-0.5)*0.4, life:180 });
  }
}

/* ---------- 更新(固定タイムステップ) ---------- */
function update(){
  // 星カウントアップ(素早く)
  if(starsDisplay < stars){ starsDisplay += Math.max(1, Math.ceil((stars-starsDisplay)/4)); }
  if(starsDisplay > stars) starsDisplay = stars;

  if(flash>0) flash--;
  walkTimer++; if(walkTimer>=9){ walkTimer=0; walkFrameIdx=(walkFrameIdx+1)%4; }
  // ヒットストップ中は世界を止める(演出以外の進行を凍結)
  if(hitStop>0){ hitStop--; return; }

  if(state==="PLAY"){
    if(!feedback && speedFrames>0) speedFrames--;
    if(feedback){
      feedback.frames--;
      if(feedback.frames<=0){
        if(feedback.type==="good"){ advance(); }
        else { feedback = null; typed = ""; } // もう一度どうぞ(入力欄をクリア)
      }
    }
    // 答え欄のぷるぷる減衰
    if(slotWobble>0) slotWobble--;
    // 動物ジャンプ減衰
    animals.forEach(a=>{ if(a.jump>0) a.jump--; });
    if(revealFx){ revealFx.t++; if(revealFx.t>=revealFx.duration) revealFx=null; }
    // 星FX
    starFx.forEach(s=>{ if(s.delay>0){ s.delay--; } else { s.t++; } });
    starFx = starFx.filter(s=> s.t < 26);
  }
  if(state==="CLEAR"){
    danceT++;
  }

  // 紙吹雪
  confetti.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--; });
  confetti = confetti.filter(p=> p.life>0 && p.y<H+30);
}

/* ---------- 描画 ---------- */
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawBackground(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#5ec9f5"); g.addColorStop(0.6,"#bff0ff"); g.addColorStop(1,"#dff7e8");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 太陽
  ctx.fillStyle="#ffd23f"; ctx.beginPath(); ctx.arc(90,90,46,0,7); ctx.fill();
  // 雲
  ctx.fillStyle="rgba(255,255,255,.9)";
  cloud(620,90,1); cloud(300,60,0.8);
  // 草地
  ctx.fillStyle="#7bd16b"; ctx.fillRect(0,H-70,W,70);
  ctx.fillStyle="#69c15b";
  for(let x=0;x<W;x+=40){ ctx.beginPath(); ctx.arc(x,H-70,20,Math.PI,0); ctx.fill(); }
}
function cloud(x,y,s){ ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.beginPath(); ctx.arc(0,0,26,0,7); ctx.arc(30,6,22,0,7); ctx.arc(-28,6,20,0,7);
  ctx.fill(); ctx.restore(); }

const titleBtns = {
  add:{x:W/2-220,y:330,w:200,h:130},
  sub:{x:W/2+20,y:330,w:200,h:130}
};
function drawTitle(){
  drawBackground();
  ctx.textAlign="center";
  // タイトル文字
  ctx.font="900 74px sans-serif"; ctx.fillStyle="#ff7b54";
  ctx.fillText("たすひき", W/2, 150);
  ctx.fillStyle="#4a7bd1"; ctx.fillText("レスキュー", W/2, 230);
  // 恐竜ちょい見せ(その場で歩くアニメーション)
  {
    const frame = WALK_FRAMES[walkFrameIdx];
    if(frame.loaded){
      const h = 72, w = h*frame.aspect;
      const y = 317;
      ctx.drawImage(frame.img, W/2-w/2, y-h, w, h);

  }
  // ボタン
  drawBigButton(titleBtns.add, "#ff8fab", "たしざん", "8 + 5");
  drawBigButton(titleBtns.sub, "#9ad0ec", "ひきざん", "13 − 6");
  ctx.font="700 22px sans-serif"; ctx.fillStyle="#2b2b45";
  ctx.fillText("えらんで タップ してね！", W/2, 520);
  ctx.font="18px sans-serif"; ctx.fillStyle="#5a6b7a";
  ctx.fillText("こたえは すうじを タイプ！ キーボードか がめんの ボタンでね", W/2, 552);
  ctx.fillText("（モードは キーボードの 1 か 2 でも えらべるよ）", W/2, 576);
}
function drawBigButton(r, col, label, sub){
  const hover = inRect(pointer.x,pointer.y,r);
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,.12)"; roundRect(r.x, r.y+8, r.w, r.h, 26); ctx.fill();
  ctx.fillStyle=col; roundRect(r.x, r.y, r.w, r.h, 26); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.35)"; roundRect(r.x+12,r.y+10,r.w-24,r.h*0.4,18); ctx.fill();
  ctx.textAlign="center"; ctx.fillStyle="#fff";
  ctx.font="900 40px sans-serif"; ctx.fillText(label, r.x+r.w/2, r.y+64);
  ctx.font="700 26px sans-serif"; ctx.fillText(sub, r.x+r.w/2, r.y+104);

}

const hintBtn = {x:W-176,y:265,w:150,h:32};
const menuBtn = {x:W/2-58,y:12,w:116,h:30}; // トップメニューへ戻る(上部中央、HUDの左右テキストとは重ならない)
function drawPlay(){
  drawBackground();
  ctx.save();
  if(hitStop>0){ ctx.translate((Math.random()-0.5)*6,(Math.random()-0.5)*6); } // ヒットストップ中の軽い振動(見た目のみ)

  // 上部 HUD:あと◯ひき / 星
  const remaining = QUESTIONS_PER_STAGE - rescued;
  ctx.textAlign="left"; ctx.font="900 30px sans-serif"; ctx.fillStyle="#2b2b45";
  ctx.fillText("あと "+remaining+" ひき", 26, 46);
  ctx.textAlign="right"; ctx.font="900 30px sans-serif"; ctx.fillStyle="#e8a300";
  ctx.fillText("⭐ "+starsDisplay, W-26, 46);

  // トップメニューへ戻るボタン(上部中央、控えめなサイズ)
  {
    const r = menuBtn;
    ctx.save();
    ctx.fillStyle="rgba(0,0,0,.10)"; roundRect(r.x,r.y+3,r.w,r.h,15); ctx.fill();
    ctx.fillStyle="#ffffff"; roundRect(r.x,r.y,r.w,r.h,15); ctx.fill();
    ctx.strokeStyle="#c9c9c9"; ctx.lineWidth=2; roundRect(r.x,r.y,r.w,r.h,15); ctx.stroke();
    ctx.fillStyle="#5a6b7a"; ctx.textAlign="center"; ctx.font="700 16px sans-serif";
    ctx.fillText("🏠 メニュー", r.x+r.w/2, r.y+r.h/2+6);
    ctx.restore();
  }

  // たすけた恐竜の列(下の草地の上)。正解した順に大きくなり、その場で歩くアニメーション。
  ctx.textAlign="center";
  const animalGap = (W-80) / (QUESTIONS_PER_STAGE-1);
  animals.forEach((a,i)=>{
    if(revealFx && revealFx.index===i) return; // 演出中はここでは描かず、後でまとめて大きく描画する
    const ax = 40 + i*animalGap, ay = H-92 - (a.jump>0 ? Math.sin(a.jump/24*Math.PI)*30 : 0);

      }

    }

  // 正解した恐竜はここでは描かない。他の要素より前面に出すため、このあと一番最後にまとめて描画する。

  if(speedFrames>0 && !feedback){

    ctx.fillStyle=grd; roundRect(bx,by,bw*ratio,barH,6); ctx.fill();
  }

  // 問題
  ctx.textAlign="center"; ctx.font="900 40px sans-serif"; ctx.fillStyle="#2b2b45";
  const q = question;
  ctx.fillText(q.a+" "+q.op+" "+q.b+" = ?", W/2, 116);

  // ヒントボタン
  drawSmallButton(hintBtn, hintOn?"#ffd166":"#ffffff", (hintOn?"✕ ":"？")+"ヒント");

  // 答え欄(入力中の数字を表示)
  {
    const b = answerBox;
    const dx = slotWobble>0 ? Math.sin(slotWobble*1.6)*8 : 0;
    const borderCol = feedback && feedback.type==="good" ? "#2bd158"
                     : feedback && feedback.type==="bad"  ? "#ff5b6a"
                     : "#c9c9c9";
    ctx.save(); ctx.translate(dx,0);
    ctx.fillStyle="rgba(0,0,0,.1)"; roundRect(b.x,b.y+6,b.w,b.h,18); ctx.fill();
    ctx.fillStyle="#fff"; roundRect(b.x,b.y,b.w,b.h,18); ctx.fill();
    ctx.strokeStyle=borderCol; ctx.lineWidth=6; roundRect(b.x,b.y,b.w,b.h,18); ctx.stroke();
    ctx.fillStyle = typed.length? "#2b2b45" : "#c7c7c7";
    ctx.font="900 34px sans-serif"; ctx.textAlign="center";
    ctx.fillText(typed.length? typed : "？", b.x+b.w/2, b.y+b.h/2+12);
    ctx.restore();
  }

  // 数字キーパッド(タップ用)—— 常に表示
  keypad.forEach(k=>{
    const isBack = k.kind==="back", isEnter = k.kind==="enter";
    const fill = isEnter ? "#7bd16b" : isBack ? "#ff9f7a" : "#ffffff";
    const txtCol = (isEnter||isBack) ? "#fff" : "#2b2b45";
    ctx.save();
    ctx.fillStyle="rgba(0,0,0,.12)"; roundRect(k.x,k.y+5,k.w,k.h,16); ctx.fill();
    ctx.fillStyle=fill; roundRect(k.x,k.y,k.w,k.h,16); ctx.fill();
    ctx.strokeStyle="#2b2b45"; ctx.lineWidth=2; roundRect(k.x,k.y,k.w,k.h,16); ctx.stroke();
    ctx.fillStyle=txtCol; ctx.textAlign="center";
    ctx.font = (isEnter||isBack) ? "800 26px sans-serif" : "900 30px sans-serif";
    ctx.fillText(k.label, k.x+k.w/2, k.y+k.h/2+10);
    ctx.restore();
  });

  // ヒント(ブロック表示)—— キーパッドの上の専用スペースに常設。押すと隠せる。
  if(hintOn){ drawHint(q); }

  // 飛ぶ星
  starFx.forEach(s=>{
    if(s.delay>0) return;
    const p = s.t/26;
    const tx = W-60, ty = 40; // 星カウンターへ
    const x = s.x + (tx-s.x)*p, y = s.y + (ty-s.y)*p - Math.sin(p*Math.PI)*40;
    ctx.font=(34-14*p)+"px sans-serif"; ctx.globalAlpha=1-p*0.3; ctx.fillText("⭐", x, y); ctx.globalAlpha=1;
  });

  // 正解した恐竜を大きく・弾ませて、火を吹きながら見せる演出 —— 最前面(他のUIより上)に描画
  if(revealFx){
    const fireIdx = Math.min(3, Math.floor(revealFx.t/revealFx.duration*4));
    const fireFrame = FIRE_FRAMES[fireIdx];
    if(fireFrame.loaded){
      const ax = 40 + revealFx.index*animalGap;
      const progress = revealFx.t / revealFx.duration;
      const bounce = Math.sin(Math.min(1,progress)*Math.PI);
      const scale = 1 + bounce*2.4*(1-progress*0.3);
      const liftY = -70*bounce;
      const wiggle = 0.18*Math.sin(progress*Math.PI*5)*(1-progress);
      const h = revealFx.h*scale, w = h*fireFrame.aspect;
      const ay = H-92 + liftY;
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(wiggle);
      ctx.drawImage(fireFrame.img, -w/2, -h, w, h);
      ctx.restore();
    }
  }

  ctx.restore();

  // フラッシュ
  if(flash>0){ ctx.fillStyle="rgba(255,255,255,"+(flash/8*0.5)+")"; ctx.fillRect(0,0,W,H); }

  drawConfetti();
}
function drawSmallButton(r,col,label){
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,.12)"; roundRect(r.x,r.y+4,r.w,r.h,16); ctx.fill();
  ctx.fillStyle=col; roundRect(r.x,r.y,r.w,r.h,16); ctx.fill();
  ctx.strokeStyle="#2b2b45"; ctx.lineWidth=2; roundRect(r.x,r.y,r.w,r.h,16); ctx.stroke();
  ctx.fillStyle="#2b2b45"; ctx.textAlign="center"; ctx.font="800 22px sans-serif";
  ctx.fillText(label, r.x+r.w/2, r.y+r.h/2+8); ctx.restore();
}
function drawHint(q){
  ctx.save();
  const COL_FIRST = "#2bd158", COL_SECOND = "#4a7bd1";

  // 1の棒(縦長)と、それを10本たばねて「10」と書いた紙で中央をしばった束で数量を見せる。
  const STICK_W=5, STICK_H=50, STICK_GAP=4, BUNDLE_W=STICK_W*10;
  function baseTenWidth(n){
    const tens=Math.floor(n/10), ones=n%10;
    let w=0;
    if(tens>0) w += tens*BUNDLE_W + (tens-1)*10 + 14;
    if(ones>0) w += ones*STICK_W + (ones-1)*STICK_GAP;
    else if(tens>0) w -= 14;
    return w;
  }
  function drawStick(x, yBase){
    ctx.fillStyle="#f6cf94"; roundRect(x, yBase-STICK_H, STICK_W, STICK_H, 2); ctx.fill();
    ctx.strokeStyle="#8a5a2b"; ctx.lineWidth=1; roundRect(x, yBase-STICK_H, STICK_W, STICK_H, 2); ctx.stroke();
  }
  function drawBundle(x, yBase){
    // 10本の棒をぴったり並べ、中央を「10」と書いた紙の帯でしばった束
    for(let s=0;s<10;s++){ drawStick(x+s*STICK_W, yBase); }
    const bandH=17, bandY = yBase-STICK_H/2-bandH/2;
    ctx.fillStyle="#fff8ea"; roundRect(x-2, bandY, BUNDLE_W+4, bandH, 3); ctx.fill();
    ctx.strokeStyle="#8a5a2b"; ctx.lineWidth=1.3; roundRect(x-2, bandY, BUNDLE_W+4, bandH, 3); ctx.stroke();
    ctx.fillStyle="#2b2b45"; ctx.font="800 12px sans-serif"; ctx.textAlign="center";
    ctx.fillText("10", x+BUNDLE_W/2, bandY+bandH-4);
    ctx.textAlign="left";
  }
  function drawBaseTen(n, x, yBase, splitAt){
    // yBase: 棒の下端(接地ライン)。tensが2以上でも束を横に並べて対応する。
    // splitAt: 棒どうしの間隔は空けず、ここまでの本数(=下の括弧の右はし)だけを記録する
    const tens=Math.floor(n/10), ones=n%10;
    let cx = x;
    for(let t=0;t<tens;t++){ drawBundle(cx, yBase); cx += BUNDLE_W+10; }
    if(tens>0) cx += 14-10;
    const onesStartX = cx; // 1の位の棒(バラ)が始まる位置(束は含まない)
    let splitEndX = null;  // 分解した最初のかたまり(splitAt本)の右はし
    for(let o=0;o<ones;o++){
      drawStick(cx, yBase); cx += STICK_W;
      if(splitAt && o===splitAt-1) splitEndX = cx;
      cx += STICK_GAP;
    }
    return { onesStartX, splitEndX };
  }
  function drawTenBracket(x0, x1, y){
    // 「あわせて10」になる2つのかたまりを、細長いかっこで下からくくる
    ctx.strokeStyle="#e2504a"; ctx.lineWidth=2.4; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath();
    ctx.moveTo(x0, y-7); ctx.lineTo(x0, y); ctx.lineTo(x1, y); ctx.lineTo(x1, y-7);
    ctx.stroke();
  }
  function drawBlockRow(a, b, opChar, yBase, splitB, showBracket){
    ctx.font = "700 22px sans-serif";
    const opW = ctx.measureText(opChar).width;
    const wA = baseTenWidth(a), wB = baseTenWidth(b);
    const gap = 14;
    const total = wA + gap + opW + gap + wB;
    let x = W/2 - total/2;
    const aResult = drawBaseTen(a, x, yBase); x += wA + gap;
    ctx.fillStyle="#2b2b45"; ctx.textAlign="left"; ctx.fillText(opChar, x, yBase-STICK_H/2+8); x += opW + gap;
    const bResult = drawBaseTen(b, x, yBase, splitB);
    ctx.textAlign="center";
    // aの1の位の棒 〜 bの最初のかたまり(splitB本)を、あわせて10になる仲間として括弧でくくる(たし算のみ)
    if(showBracket && bResult.splitEndX){
      drawTenBracket(aResult.onesStartX, bResult.splitEndX, yBase+9);
    }
  }

  function coloredText(parts, cx, cy, font){
    // parts: [{text,color}, ...] を横並びで中央ぞろえに描く(色分け数式用)
    ctx.font = font;
    const widths = parts.map(p=>ctx.measureText(p.text).width);
    const total = widths.reduce((s,w)=>s+w,0);
    let x = cx - total/2;
    ctx.textAlign="left";
    parts.forEach((p,i)=>{ ctx.fillStyle=p.color; ctx.fillText(p.text, x, cy); x += widths[i]; });
    ctx.textAlign="center";
  }

  const L1 = HINT_Y+100;
  const FONT_EQ = "900 26px sans-serif";

  const splitB = (q.op==="+") ? (10-(q.a%10)) : (q.a-10);
  drawBlockRow(q.a, q.b, q.op==="+" ? "+" : "−", HINT_Y+64, splitB, q.op==="+");

  if(q.op==="+"){
    // 4+9 なら 4+(6+3) と分解して見せるだけ。仕上げの計算は自分でやってもらう。
    const a=q.a, b=q.b, n1=10-(a%10), n2=b-n1; // n1: aの一の位と合わせて10になる数 / n2: のこり

    // 「a + (n1 + n2)」
    coloredText([
      {text:a+" + (", color:"#2b2b45"},
      {text:String(n1), color:COL_FIRST},
      {text:" + ", color:"#2b2b45"},
      {text:String(n2), color:COL_SECOND},
      {text:")", color:"#2b2b45"}

    ], W/2, L1, FONT_EQ);

  } else {
    // 12-6 なら 12-(2+4) と分解して見せるだけ。仕上げの計算は自分でやってもらう。
    const a=q.a, b=q.b, m1=a-10, m2=b-m1; // m1: aの一の位(先に引く数) / m2: のこりに引く数

    // 「a − (m1 + m2)」
    coloredText([
      {text:a+" − (", color:"#2b2b45"},
      {text:String(m1), color:COL_FIRST},
      {text:" + ", color:"#2b2b45"},
      {text:String(m2), color:COL_SECOND},
      {text:")", color:"#2b2b45"}
    ], W/2, L1, FONT_EQ);
  }
  ctx.restore();
}
function drawConfetti(){
  confetti.forEach(p=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.col; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); ctx.restore(); });
}
function drawClear(){
  drawBackground();
  ctx.textAlign="center";
  ctx.font="900 64px sans-serif"; ctx.fillStyle="#ff7b54";
  ctx.fillText("クリア！", W/2, 140);
  ctx.font="900 34px sans-serif"; ctx.fillStyle="#2b2b45";
  ctx.fillText(rescued+" ひき たすけたよ！", W/2, 206);
  ctx.font="900 40px sans-serif"; ctx.fillStyle="#e8a300";
  ctx.fillText("⭐ "+stars, W/2, 268);

  // パーフェクト表示
  if(perfect){
    ctx.font="900 30px sans-serif"; ctx.fillStyle="#2bd158";
    ctx.fillText("ぜんもん せいかい！✨", W/2, 322);
  }

  // 恐竜ダンス(歩行アニメーションで揺れながらお祝い)
  ctx.textAlign="center";
  const danceGap = (W-100) / (QUESTIONS_PER_STAGE-1);
  animals.forEach((a,i)=>{
    const x = 50 + i*danceGap;
    const y = 392 + Math.sin(danceT/8 + i)*22;
    if(a.saved){
      const frame = WALK_FRAMES[walkFrameIdx];
      if(frame.loaded){
        const h = Math.min(76, a.h+16), w = h*frame.aspect;
        ctx.drawImage(frame.img, x-w/2, y-h, w, h);
      }
    } else {
      ctx.font = "40px sans-serif";
      ctx.fillText("🥚", x, y);
    }
  });

  if(!bonusUsed){
    // ボーナスボタン(もちつき)—— 目立たせて、ゆらゆら弾ませる
    const pulse = 1 + Math.sin(danceT/6)*0.03;
    const r = bonusBtn, cx = r.x+r.w/2, cy = r.y+r.h/2;
    ctx.save(); ctx.translate(cx,cy); ctx.scale(pulse,pulse); ctx.translate(-cx,-cy);
    ctx.fillStyle="rgba(0,0,0,.15)"; roundRect(r.x,r.y+6,r.w,r.h,24); ctx.fill();
    const grd = ctx.createLinearGradient(r.x,r.y,r.x,r.y+r.h);
    grd.addColorStop(0,"#ff7b54"); grd.addColorStop(1,"#ff5b8a");
    ctx.fillStyle=grd; roundRect(r.x,r.y,r.w,r.h,24); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.35)"; roundRect(r.x+14,r.y+10,r.w-28,r.h*0.38,16); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="900 30px sans-serif";
    ctx.fillText("🎁 ごほうび！うさぎのもちつき", cx, cy+10);
    ctx.restore();
  } else {
    ctx.font="700 26px sans-serif"; ctx.fillStyle="#2b2b45";
    ctx.fillText("タップ で もういちど！", W/2, 520);
  }
  drawConfetti();
}

/* ---------- メインループ(固定タイムステップ 60fps) ---------- */
const STEP = 1000/60;
let acc = 0, last = performance.now();
function loop(now){
  acc += now - last; last = now;
  if(acc > 250) acc = 250; // スパイク保護
  let guard = 0;
  while(acc >= STEP && guard<5){ update(); acc -= STEP; guard++; }
  if(state==="TITLE") drawTitle();
  else if(state==="PLAY") drawPlay();
  else if(state==="CLEAR") drawClear();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
