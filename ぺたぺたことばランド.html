<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ぺたぺた ことばランド</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family:'Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;
    font-weight:bold;
    background:linear-gradient(180deg,#bde8ff 0%,#e8fbde 70%,#d7f5c0 100%);
    display:flex; flex-direction:column;
  }
  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:16px; opacity:1; transition:opacity .25s; }
  .screen.show { display:flex; }
  .screen.fadeout { opacity:0; }

  /* ---------- タイトル ---------- */
  #scr-title h1 { font-size:min(11vw,64px); color:#ff7043; text-shadow:0 4px 0 #fff; margin-bottom:8px; text-align:center; line-height:1.3; }
  #scr-title .deco { font-size:min(14vw,80px); margin-bottom:24px; animation:bounce 1.2s infinite ease-in-out; }
  .bigbtn {
    font-family:inherit; font-weight:bold; border:none; cursor:pointer;
    background:#ff9800; color:#fff; font-size:min(9vw,48px);
    padding:22px 60px; border-radius:60px; box-shadow:0 8px 0 #e65100;
    transition:transform .1s;
  }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 2px 0 #e65100; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }

  /* ---------- モード選択 ---------- */
  #scr-modes h2 { font-size:min(8vw,40px); color:#5d4037; margin-bottom:20px; }
  .modebtn {
    font-family:inherit; font-weight:bold; border:none; cursor:pointer;
    width:min(80vw,420px); margin:10px 0; padding:18px 10px;
    border-radius:32px; font-size:min(7.5vw,36px); color:#fff;
    box-shadow:0 6px 0 rgba(0,0,0,.25); transition:transform .1s;
    display:flex; align-items:center; justify-content:center; gap:14px;
  }
  .modebtn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.25); }
  .modebtn .em { font-size:min(10vw,52px); }
  #m-iro { background:#ec407a; } #m-kazu { background:#42a5f5; } #m-moji { background:#66bb6a; }

  /* ---------- プレイ画面 ---------- */
  #scr-play { justify-content:flex-start; padding-top:8px; }
  #topbar { width:100%; display:flex; align-items:center; justify-content:space-between; padding:4px 8px; }
  #starbox { background:#fff8; border-radius:24px; padding:6px 16px; font-size:min(6.5vw,30px); color:#f57f17; transition:transform .2s; }
  #starbox.pop { transform:scale(1.35); }
  #mutebtn,#homebtn { border:none; background:#fff8; border-radius:50%; width:52px; height:52px; font-size:26px; cursor:pointer; }
  #qarea { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; margin-top:6px; min-height:22vh; justify-content:center; }
  #qpic { font-size:min(26vw,130px); line-height:1.1; }
  #qpic .qpic-img { height:min(22vw,110px); width:auto; vertical-align:middle; }
  #qtext { font-size:min(7vw,34px); color:#4e342e; text-align:center; margin-top:4px; }
  #speakbtn { border:none; background:#fff; border-radius:50%; width:64px; height:64px; font-size:30px; margin-top:8px; cursor:pointer; box-shadow:0 4px 0 #bbb; }
  #speakbtn:active { transform:translateY(3px); box-shadow:0 1px 0 #bbb; }

  #choices { flex:1; width:100%; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:16px; padding:10px; align-content:center; }
  .choice {
    font-family:inherit; font-weight:bold; border:none; cursor:pointer;
    background:#fff; border-radius:32px; box-shadow:0 6px 0 #ccc;
    width:min(38vw,210px); height:min(38vw,210px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:min(20vw,96px); color:#37474f; transition:transform .1s;
    position:relative;
  }
  .choice:active { transform:scale(.95); }
  .choice .word { font-size:min(8vw,38px); }
  .choice svg { width:70%; height:70%; }
  .choice.correct-anim { animation:pop .5s ease; z-index:5; }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 70%{transform:scale(.95)} 100%{transform:scale(1)} }
  .choice.wrong-anim { animation:shake .4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .choice.hint { animation:hintpulse .5s infinite alternate; }
  @keyframes hintpulse { from{box-shadow:0 6px 0 #ccc,0 0 0 0 #ffd54f} to{box-shadow:0 6px 0 #ccc,0 0 0 12px #ffd54faa} }
  .choice.dim { opacity:.35; pointer-events:none; }

  /* かず(あつめる) */
  #kazuarea { flex:1; width:100%; display:none; flex-direction:column; align-items:center; justify-content:center; }
  #fruitgrid { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; max-width:600px; }
  .fruit { border:none; background:#fff9; border-radius:24px; font-size:min(15vw,72px); padding:6px 10px; cursor:pointer; transition:transform .1s; font-family:inherit; }
  #fruitgrid.dense .fruit { font-size:min(9.5vw,46px); padding:4px 7px; border-radius:16px; }
  .fruit:active { transform:scale(.9); }
  .fruit.gone { opacity:0; transform:scale(.2) translateY(-40px); transition:all .33s; pointer-events:none; }
  .fruit.no { animation:shake .4s ease; }
  #basket { font-size:min(13vw,64px); margin-top:12px; background:#fff8; border-radius:24px; padding:4px 20px; min-height:1.4em; }
  #countnum { font-size:min(10vw,48px); color:#1565c0; }

  /* くらべる */
  #comparearea { flex:1; width:100%; display:none; gap:14px; padding:10px; align-items:stretch; justify-content:center; }
  .cmp { flex:1; max-width:320px; border:none; background:#fff; border-radius:32px; box-shadow:0 6px 0 #ccc; cursor:pointer; padding:10px; font-family:inherit; display:flex; flex-wrap:wrap; align-content:center; justify-content:center; align-items:center; gap:4px; }
  .cmp:active { transform:scale(.96); }
  .cmp img { width:min(11vw,52px); height:auto; }
  .cmp.many img { width:min(8vw,38px); }
  .cmp.correct-anim { animation:pop .5s ease; }
  .cmp.wrong-anim { animation:shake .4s ease; }
  .cmp.hint { animation:hintpulse .5s infinite alternate; }

  /* バス */
  #busbar { width:100%; display:flex; align-items:center; justify-content:center; gap:4px; padding:6px; font-size:min(9vw,42px); background:#fff6; border-radius:24px 24px 0 0; min-height:60px; }
  #busbar .bus { font-size:min(11vw,52px); }
  #busbar .pax { animation:paxin .4s ease; }
  @keyframes paxin { from{transform:scale(0)} to{transform:scale(1)} }

  /* ごほうび */
  #scr-reward { background:#fff9e6ee; }
  #scr-reward h2 { font-size:min(10vw,52px); color:#ff7043; margin-bottom:16px; }
  #dancers { display:flex; gap:10px; margin-bottom:24px; align-items:flex-end; }
  #dancers img { height:min(16vw,84px); width:auto; display:inline-block; animation:dance .5s infinite alternate ease-in-out; }
  #dancers img:nth-child(2n) { animation-delay:.25s; }
  @keyframes dance { from{transform:translateY(0) rotate(-8deg)} to{transform:translateY(-24px) rotate(8deg)} }
  #reward-stars { font-size:min(8vw,40px); color:#f57f17; margin-bottom:20px; }

  /* 演出 */
  #fx { position:fixed; inset:0; pointer-events:none; z-index:50; }
  .ripple { position:fixed; border-radius:50%; border:4px solid #ffffffcc; pointer-events:none; z-index:49; animation:rip .4s ease-out forwards; }
  @keyframes rip { from{opacity:.9; transform:translate(-50%,-50%) scale(.2)} to{opacity:0; transform:translate(-50%,-50%) scale(1.6)} }
  body.freeze .choice, body.freeze .fruit, body.freeze #dancers img { animation-play-state:paused !important; }
  #praise { position:fixed; top:38%; left:50%; transform:translate(-50%,-50%); font-size:min(13vw,64px); color:#ff5722; text-shadow:0 3px 0 #fff; z-index:60; pointer-events:none; opacity:0; }
  #praise.on { animation:praisein 1.2s ease forwards; }
  @keyframes praisein { 0%{opacity:0; transform:translate(-50%,-50%) scale(.3)} 25%{opacity:1; transform:translate(-50%,-50%) scale(1.15)} 45%{transform:translate(-50%,-50%) scale(1)} 80%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div id="scr-title" class="screen show">
  <div class="deco">🦆🍎⭐🐻🌈</div>
  <h1>ぺたぺた<br>ことばランド</h1>
  <button id="startbtn" class="bigbtn">はじめる!</button>
</div>

<div id="scr-modes" class="screen">
  <h2>どれで あそぶ?</h2>
  <button class="modebtn" id="m-iro"><span class="em">🔴🔺</span>いろ・かたち</button>
  <button class="modebtn" id="m-kazu"><span class="em">🍎3️⃣</span>かず</button>
  <button class="modebtn" id="m-moji"><span class="em">🦆あ</span>ひらがな</button>
</div>

<div id="scr-play" class="screen">
  <div id="topbar">
    <div id="starbox">⭐ <span id="starnum">0</span></div>
    <div>
      <button id="homebtn">🏠</button>
      <button id="mutebtn">🔊</button>
    </div>
  </div>
  <div id="qarea">
    <div id="qpic"></div>
    <div id="qtext"></div>
    <button id="speakbtn">🔊</button>
  </div>

  <div id="kazuarea">

</div>

<div id="scr-reward" class="screen">

  <div id="dancers"></div>
  <div id="reward-stars"></div>
  <button id="rewardbtn" class="bigbtn">もっと あそぶ</button>
</div>

<canvas id="fx"></canvas>
<div id="praise"></div>

<script>
'use strict';
/* ================= 基本定数(60fps基準) ================= */
const F = 1000/60;                 // 1フレーム(ms)
const LOCK_CORRECT_F = 90, LOCK_WRONG_F = 45, NEXT_GAP_F = 20;
const HITSTOP_F = 8, QUESTIONS_PER_SET = 7;

/* ================= オーディオ(Web Audio 合成) ================= */
const AudioSys = (() => {
  let ctx = null, master, sfxBus, muted = false;
  function ensure() {
    if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return ctx; }
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    sfxBus = ctx.createGain(); sfxBus.gain.value = 0.9;
    sfxBus.connect(master); master.connect(ctx.destination);
    return ctx;
  }
  document.addEventListener('pointerdown', ensure); // 解錠の保険
  function tone({ freq=440, shape='sine', when=0, dur=0.15, attack=0.008, volume=0.3 }) {
    const c = ensure(); if (muted) return;
    const t0 = when || c.currentTime;
    const o = c.createOscillator(); o.type = shape; o.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(volume, t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(sfxBus);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  function slide({ f0=320, f1=180, shape='sine', dur=0.3, volume=0.25 }) {
    const c = ensure(); if (muted) return;
    const t0 = c.currentTime;
    const o = c.createOscillator(); o.type = shape;
    o.frequency.setValueAtTime(f0, t0);
    o.frequency.exponentialRampToValueAtTime(f1, t0 + dur);
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(volume, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(sfxBus);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  const vary = f => f * (1 + (Math.random()*2-1)*0.04); // 繰り返し疲労防止
  // Cメジャー・スケール(数え上げ: ど〜みまで10音)
  const SCALE = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.26];
  const SFX = {
    tap()      { tone({ freq:vary(660), dur:0.07, volume:0.12 }); },
    pinpon()   { tone({ freq:783.99, dur:0.18, volume:0.3 });
                 tone({ freq:1046.5, when:AudioSys.now()+0.16, dur:0.3, volume:0.3 }); },
    fanfare()  { const t = AudioSys.now()+0.02;
                 [523.25,659.25,783.99,1046.5].forEach((f,i) =>
                   tone({ freq:f, when:t+i*0.09, dur:i===3?0.45:0.12, volume:0.3 })); },
    count(n)   { tone({ freq:SCALE[Math.min(n-1,9)], dur:0.16, volume:0.3 }); },
    wrong()    { slide({ f0:330, f1:196, dur:0.3, volume:0.18 }); },          // ぽよん
    huh()      { slide({ f0:392, f1:330, dur:0.18, volume:0.14 }); },         // あれ?
    star()     { tone({ freq:2093, dur:0.1, volume:0.2 });
                 tone({ freq:2637, when:AudioSys.now()+0.07, dur:0.16, volume:0.18 }); },
    jingle()   { const t = AudioSys.now()+0.02;
                 const seq = [[523.25,0],[523.25,.14],[523.25,.28],[659.25,.42],[783.99,.6],[1046.5,.8]];
                 seq.forEach(([f,d],i) => tone({ freq:f, when:t+d, dur:i===5?0.7:0.14, volume:0.32 })); },
    horn()     { tone({ freq:220, shape:'triangle', dur:0.18, volume:0.3 });
                 tone({ freq:220, shape:'triangle', when:AudioSys.now()+0.24, dur:0.3, volume:0.3 }); },
  };
  return {
    ensure, ...SFX,
    now() { return ensure().currentTime; },
    setMute(m) { muted = m; },
    get muted() { return muted; }
  };
})();

/* ================= 読み上げ ================= */
const Speech = (() => {
  let jaVoice = null, enabled = 'speechSynthesis' in window;
  function pick() {
    if (!enabled) return;
    const vs = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    jaVoice = vs.find(v => v.localService) || vs[0] || null;
  }
  if (enabled) { pick(); speechSynthesis.onvoiceschanged = pick; }
  function say(text) {
    if (!enabled || AudioSys.muted) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP'; u.rate = 0.85; u.pitch = 1.15;
      if (jaVoice) u.voice = jaVoice;
      speechSynthesis.speak(u);
    } catch(e) {}
  }
  return { say };
})();

/* ================= 演出キャンバス(固定タイムステップ) ================= */
const Fx = (() => {
  const cv = document.getElementById('fx'), g = cv.getContext('2d');
  let parts = [], freezeFrames = 0, acc = 0, last = performance.now();
  function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
  addEventListener('resize', resize); resize();
  const COLORS = ['#e53935','#1e88e5','#fdd835','#43a047','#fb8c00','#ec407a','#8e24aa'];
  function confetti(n, x, y) {
    for (let i=0;i<n;i++) parts.push({
      kind:'c', x:x??Math.random()*cv.width, y:y??-10,
      vx:(Math.random()*2-1)*4, vy:Math.random()*-6-2,
      rot:Math.random()*6.28, vr:(Math.random()*2-1)*0.25,
      col:COLORS[i%COLORS.length], life:90+Math.random()*30, w:8+Math.random()*6
    });
  }
  function flyStar(x0, y0, x1, y1, done) {
    parts.push({ kind:'s', t:0, dur:30, x0,y0,x1,y1, done });
  }
  function step() {
    if (freezeFrames > 0) { freezeFrames--; return; }
    for (const p of parts) {
      if (p.kind==='c') { p.vy+=0.18; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--; }
      else { p.t++; if (p.t>=p.dur && p.done) { p.done(); p.done=null; } }
    }
    parts = parts.filter(p => p.kind==='c' ? (p.life>0 && p.y<cv.height+20) : p.t<p.dur);
  }
  function draw() {
    g.clearRect(0,0,cv.width,cv.height);
    for (const p of parts) {
      if (p.kind==='c') {
        g.save(); g.translate(p.x,p.y); g.rotate(p.rot);
        g.globalAlpha = Math.min(1, p.life/30);
        g.fillStyle = p.col; g.fillRect(-p.w/2,-p.w/4,p.w,p.w/2); g.restore();
      } else {
        const k = p.t/p.dur, x = p.x0+(p.x1-p.x0)*k,
              y = p.y0+(p.y1-p.y0)*k - Math.sin(k*Math.PI)*120;
        g.font = '32px serif'; g.textAlign='center'; g.textBaseline='middle';
        g.fillText('⭐', x, y);
      }
    }
  }
  function loop(t) {
    acc += t - last; last = t;
    acc = Math.min(acc, 100);
    while (acc >= F) { step(); acc -= F; }
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  return {
    confetti, flyStar,
    hitStop(f) { freezeFrames = f; document.body.classList.add('freeze');
                 setTimeout(()=>document.body.classList.remove('freeze'), f*F); }
  };
})();

/* タップ波紋+音(ノーリアクション排除) */
document.addEventListener('pointerdown', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX+'px'; r.style.top = e.clientY+'px';
  r.style.width = r.style.height = '60px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(), 450);
  AudioSys.tap();
});

/* ================= データ ================= */
const COLORS8 = [
  { name:'あか',    speak:'あか',    hex:'#e53935' },
  { name:'あお',    speak:'あお',    hex:'#1e88e5' },
  { name:'きいろ',  speak:'きいろ',  hex:'#fdd835' },
  { name:'みどり',  speak:'みどり',  hex:'#43a047' },
  { name:'オレンジ',speak:'おれんじ',hex:'#fb8c00' },
  { name:'ピンク',  speak:'ぴんく',  hex:'#f06292' },
  { name:'むらさき',speak:'むらさき',hex:'#8e24aa' },
  { name:'ちゃいろ',speak:'ちゃいろ',hex:'#795548' },
];
const SHAPES5 = [
  { name:'まる',     speak:'まる',    path:c=>`<circle cx="50" cy="50" r="40" fill="${c}"/>` },
  { name:'さんかく', speak:'さんかく',path:c=>`<polygon points="50,12 90,84 10,84" fill="${c}"/>` },
  { name:'しかく',   speak:'しかく',  path:c=>`<rect x="14" y="14" width="72" height="72" rx="8" fill="${c}"/>` },
  { name:'ほし',     speak:'ほし',    path:c=>`<polygon points="50,8 61,38 93,38 67,57 76,88 50,69 24,88 33,57 7,38 39,38" fill="${c}"/>` },
  { name:'ハート',   speak:'はーと',  path:c=>`<path d="M50 88 C20 64 8 46 8 32 C8 18 20 10 31 10 C40 10 47 15 50 22 C53 15 60 10 69 10 C80 10 92 18 92 32 C92 46 80 64 50 88 Z" fill="${c}"/>` },
];
const FRUITS = [
  { name:'りんご', em:'🍎' }, { name:'ばなな', em:'🍌' }, { name:'みかん', em:'🍊' },
  { name:'ぶどう', em:'🍇' }, { name:'いちご', em:'🍓' }, { name:'もも', em:'🍑' },
];
const KAZU_WORD = ['ひとつ','ふたつ','みっつ','よっつ','いつつ','むっつ','ななつ','やっつ','ここのつ','とお'];
const KAZU_COUNT = ['いち','に','さん','よん','ご','ろく','なな','はち','きゅう','じゅう'];

/* ================= ユーティリティ ================= */
const $ = id => document.getElementById(id);
const rand = a => a[Math.floor(Math.random()*a.length)];
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickN(a,n,not){ return shuffle(a.filter(x=>x!==not)).slice(0,n); }

/* ================= 状態 ================= */
const State = {
  mode:null, qIndex:0, locked:false, wrongCount:0, mistakeInQ:false,
  streak:{iro:0,kazu:0,moji:0}, fails:{iro:0,kazu:0,moji:0},
  promoted:{iro:false,kazu:false,moji:false},
  stars:0, pax:0, setStars:0, lastKey:null,
  kazu:{ target:0, count:0 },
};
try {
  State.stars = +(localStorage.getItem('pk_stars')||0);
  State.pax   = +(localStorage.getItem('pk_pax')||0);
} catch(e){}
function persist(){ try{ localStorage.setItem('pk_stars',State.stars); localStorage.setItem('pk_pax',State.pax);}catch(e){} }

/* ================= 画面遷移(フェード15F) ================= */
let current = 'scr-title';
function showScreen(id) {
  const cur = $(current);
  cur.classList.add('fadeout');
  setTimeout(() => {
    cur.classList.remove('show','fadeout');
    $(id).classList.add('show');
    current = id;
  }, 15*F);
}

/* ================= 星とバス ================= */
function refreshHud(){
  $('starnum').textContent = State.stars;
  const bar = $('busbar');
  bar.innerHTML = '<span class="bus">🚌</span>';
  const POOL = ['🐶','🐱','🐰','🐻','🐼','🦁','🐸'];
  for (let i=0;i<State.pax;i++){
    const s = document.createElement('span');
    s.className='pax'; s.textContent = POOL[i%POOL.length];
    bar.appendChild(s);
  }
}
function gainStar(fromEl){
  State.stars++; State.setStars++;
  const r0 = (fromEl||$('qpic')).getBoundingClientRect();
  const r1 = $('starbox').getBoundingClientRect();
  Fx.flyStar(r0.left+r0.width/2, r0.top+r0.height/2, r1.left+r1.width/2, r1.top+r1.height/2, () => {
    AudioSys.star();
    $('starnum').textContent = State.stars;
    $('starbox').classList.add('pop');
    setTimeout(()=>$('starbox').classList.remove('pop'), 12*F);
    if (State.stars % 3 === 0) {
      State.pax++;
      if (State.pax >= 7) {
        AudioSys.horn(); Speech.say('バスが まんいんだよ! しゅっぱーつ!');
        Fx.confetti(40);
        State.pax = 0;
        setTimeout(refreshHud, 900);
      } else refreshHud();
    }
    persist();
  });
}

/* ================= 難易度制御 ================= */
function reportResult(ok){
  const m = State.mode;
  if (ok && !State.mistakeInQ) {
    State.streak[m]++; State.fails[m]=0;
    if (State.streak[m] >= 3) State.promoted[m] = true;
  } else if (!ok || State.mistakeInQ) {
    State.fails[m]++; State.streak[m]=0;
    if (State.fails[m] >= 2) { State.promoted[m] = false; State.fails[m]=0; }
  }
}

/* ================= 正解/不正解の共通演出 ================= */
function onCorrect(el){
  State.locked = true;
  Fx.hitStop(HITSTOP_F);
  setTimeout(() => {
    el && el.classList.add('correct-anim');
    if (State.streak[State.mode] >= 2) AudioSys.fanfare(); else AudioSys.pinpon();
    const p = rand(PRAISE);
    Speech.say(p);
    const pr = $('praise'); pr.textContent = p;
    pr.classList.remove('on'); void pr.offsetWidth; pr.classList.add('on');
    const r = el ? el.getBoundingClientRect() : {left:innerWidth/2-40,top:innerHeight/2-40,width:80,height:80};
    Fx.confetti(60, r.left+r.width/2, r.top+r.height/3);
    gainStar(el);
    reportResult(true);
  }, HITSTOP_F*F);
  setTimeout(nextQuestion, (HITSTOP_F+LOCK_CORRECT_F+NEXT_GAP_F)*F);
}
function onWrong(el, correctEl){
  State.locked = true;
  State.mistakeInQ = true;
  State.wrongCount++;
  el.classList.add('wrong-anim');
  setTimeout(()=>el.classList.remove('wrong-anim'), 24*F);
  AudioSys.wrong();
  Speech.say(rand(['おしい!','あれれ?','もういっかい!']));
  if (State.wrongCount >= 2 && correctEl) correctEl.classList.add('hint');
  setTimeout(()=>{ State.locked = false; }, LOCK_WRONG_F*F);
}

/* ================= 出題 ================= */
function startSet(mode){
  State.mode = mode; State.qIndex = 0; State.setStars = 0;
  showScreen('scr-play');
  setTimeout(buildQuestion, 16*F);
}
function nextQuestion(){
  if (current !== 'scr-play') return;   // ホームに戻った後は出題しない
  State.qIndex++;
  if (State.qIndex >= QUESTIONS_PER_SET) reward();
  else buildQuestion();
}
let currentSpeak = '';
function askSpeak(){ Speech.say(currentSpeak); }
$('speakbtn').addEventListener('pointerdown', e => { e.stopPropagation(); });
$('speakbtn').addEventListener('click', askSpeak);

function resetPlayArea(){
  State.locked = false; State.wrongCount = 0; State.mistakeInQ = false;
  $('choices').innerHTML=''; $('choices').style.display='flex';
  $('kazuarea').style.display='none'; $('comparearea').style.display='none';
  $('comparearea').innerHTML='';
  $('qpic').textContent=''; $('qtext').textContent='';
  refreshHud();
}

function buildQuestion(){
  resetPlayArea();
  const m = State.mode;
  if (m==='iro') buildIro();
  else if (m==='kazu') { if (State.promoted.kazu && Math.random()<0.4) buildCompare(); else buildCollect(); }
  else { if (Math.random()<0.55) buildMojiLetter(); else buildMojiWord(); }
}

/* --- いろ・かたち --- */
function buildIro(){
  const promoted = State.promoted.iro;
  const nChoice = promoted ? 4 : 3;
  const combo = promoted && Math.random()<0.5;
  let items, correctIdx, qSpeak, qText;
  if (combo) {
    const col = rand(COLORS8), shp = rand(SHAPES5);
    const others = [];
    // 片方だけ合うダミー
    const otherCol = rand(COLORS8.filter(c=>c!==col));
    const otherShp = rand(SHAPES5.filter(s=>s!==shp));
    others.push({col:otherCol, shp});      // 形は合う・色ちがい
    others.push({col, shp:otherShp});      // 色は合う・形ちがい
    others.push({col:otherCol, shp:otherShp});
    items = shuffle([{col,shp,ok:true}].concat(others.slice(0,nChoice-1).map(o=>({...o,ok:false}))));
    correctIdx = items.findIndex(i=>i.ok);
    qSpeak = `${col.speak}い ${shp.speak}は どれ?`.replace('おれんじい','おれんじの').replace('ぴんくい','ぴんくの').replace('きいろい','きいろの').replace('みどりい','みどりの').replace('むらさきい','むらさきの').replace('ちゃいろい','ちゃいろの');
    qText = `${col.name}の ${shp.name}は どれ?`;
  } else if (Math.random()<0.5) {
    // 色あて(形は同一)
    const shp = rand(SHAPES5);
    const cols = pickN(COLORS8, nChoice);
    const correct = cols[0];
    items = shuffle(cols.map(c=>({col:c, shp, ok:c===correct})));
    correctIdx = items.findIndex(i=>i.ok);
    const key = 'c'+correct.name;
    if (key === State.lastKey) return buildIro();
    State.lastKey = key;
    qSpeak = `${correct.speak}は どれ?`; qText = `${correct.name}は どれ?`;
  } else {
    // 形あて(色は同一)
    const col = rand(COLORS8);
    const shps = pickN(SHAPES5, nChoice);
    const correct = shps[0];
    items = shuffle(shps.map(s=>({col, shp:s, ok:s===correct})));
    correctIdx = items.findIndex(i=>i.ok);
    const key = 's'+correct.name;
    if (key === State.lastKey) return buildIro();
    State.lastKey = key;
    qSpeak = `${correct.speak}は どれ?`; qText = `${correct.name}は どれ?`;
  }
  $('qpic').textContent = '👀';
  $('qtext').textContent = qText;
  currentSpeak = qSpeak;
  const btns = [];
  items.forEach((it,i) => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = `<svg viewBox="0 0 100 100">${it.shp.path(it.col.hex)}</svg>`;
    b.addEventListener('click', () => {
      if (State.locked) return;
      if (i===correctIdx) onCorrect(b); else onWrong(b, btns[correctIdx]);
    });
    $('choices').appendChild(b); btns.push(b);
  });
  Speech.say(qSpeak);
}

/* --- かず: あつめる --- */
function buildCollect(){
  $('choices').style.display='none';
  $('kazuarea').style.display='flex';
  const promoted = State.promoted.kazu;
  const target = promoted ? 1+Math.floor(Math.random()*10) : 1+Math.floor(Math.random()*5);
  const fruit = rand(FRUITS);
  const others = pickN(FRUITS, 2, fruit);
  State.kazu = { target, count:0 };
  const qSpeak = `${fruit.name}を ${KAZU_WORD[target-1]} あつめて!`;
  currentSpeak = qSpeak;
  $('qpic').textContent = fruit.em;
  $('qtext').textContent = `${fruit.name}を ${KAZU_WORD[target-1]} あつめて!`;
  $('countnum').textContent = '0 / '+target;
  const grid = $('fruitgrid'); grid.innerHTML='';
  const extraSame = 2 + Math.floor(Math.random()*2);          // 対象は目標+2〜3
  const list = [];
  for (let i=0;i<target+extraSame;i++) list.push({em:fruit.em, ok:true});
  const nOther = Math.max(3, Math.floor((target+extraSame)*0.6));
  for (let i=0;i<nOther;i++) list.push({em:rand(others).em, ok:false});
  grid.classList.toggle('dense', list.length > 12);
  shuffle(list).forEach(it => {
    const b = document.createElement('button');
    b.className='fruit'; b.textContent = it.em;
    b.addEventListener('click', () => {
      if (State.locked) return;
      if (it.ok) {
        State.kazu.count++;
        const n = State.kazu.count;
        AudioSys.count(n);
        Speech.say(KAZU_COUNT[n-1]);
        b.classList.add('gone');
        $('countnum').textContent = n+' / '+target;
        if (n >= target) onCorrect($('basket'));
      } else {
        AudioSys.huh();
        b.classList.add('no');
        setTimeout(()=>b.classList.remove('no'), 24*F);
        State.mistakeInQ = true;
      }
    });
    grid.appendChild(b);
  });
  Speech.say(qSpeak);
}

/* --- かず: くらべる(昇格時のみ) --- */
function buildCompare(){
  $('choices').style.display='none';
  $('comparearea').style.display='flex';
  const key = rand(CMP_ANIMALS);
  let a = 2+Math.floor(Math.random()*7);
  let b = a + 2 + Math.floor(Math.random()*3);
  if (b > 10) { b = a; a = b - 2 - Math.floor(Math.random()*3); }
  if (Math.random()<0.5) [a,b] = [b,a];
  const qSpeak = 'どっちが おおい?';
  currentSpeak = qSpeak;
  $('qpic').innerHTML = `<img class="qpic-img" src="${DINO_IMG[key]}" alt="">`;
  $('qtext').textContent = 'どっちが おおい?';
  const area = $('comparearea');
  const btns = [a,b].map(n => {
    const el = document.createElement('button');
    el.className='cmp'; el.classList.toggle('many', n>6);
    for (let i=0;i<n;i++) {
      const img = document.createElement('img');
      img.src = DINO_IMG[key]; img.alt = '';
      el.appendChild(img);
    }
    area.appendChild(el); return el;
  });
  const correctEl = a>b ? btns[0] : btns[1];
  btns.forEach(el => el.addEventListener('click', () => {
    if (State.locked) return;
    if (el === correctEl) onCorrect(el); else onWrong(el, correctEl);
  }));
  Speech.say(qSpeak);
}

/* --- ひらがな: もじあて --- */
function buildMojiLetter(){
  const promoted = State.promoted.moji;
  const nChoice = promoted ? 4 : 3;
  const target = rand(MOJI);
  if ('m'+target[0] === State.lastKey) return buildMojiLetter();
  State.lastKey = 'm'+target[0];
  let dummies;
  if (promoted && SIMILAR[target[0]]) {
    const sims = SIMILAR[target[0]].filter(x=>x!==target[0]);
    const rest = pickN(MOJI.map(m=>m[0]), nChoice, target[0]).filter(x=>!sims.includes(x));
    dummies = sims.concat(rest).slice(0, nChoice-1);
  } else {
    dummies = pickN(MOJI.map(m=>m[0]), nChoice-1, target[0]);
  }
  const items = shuffle([target[0]].concat(dummies));
  const qSpeak = `${target[1]}の 「${target[0]}」は どれ?`;
  currentSpeak = qSpeak;
  $('qpic').textContent = target[2];
  $('qtext').textContent = `${target[1]}の 「${target[0]}」は どれ?`;
  const btns = [];
  let correctEl = null;
  items.forEach(ch => {
    const b = document.createElement('button');
    b.className='choice'; b.textContent = ch;
    if (ch === target[0]) correctEl = b;
    b.addEventListener('click', () => {
      if (State.locked) return;
      if (ch === target[0]) onCorrect(b); else onWrong(b, correctEl);
    });
    $('choices').appendChild(b); btns.push(b);
  });
  Speech.say(qSpeak);
}

/* --- ひらがな: これなあに? --- */
function buildMojiWord(){
  const promoted = State.promoted.moji;
  const nChoice = promoted ? 4 : 3;
  const target = rand(WORDS);
  if ('w'+target[0] === State.lastKey) return buildMojiWord();
  State.lastKey = 'w'+target[0];
  const sameCat = WORDS.filter(w=>w[2]===target[2] && w[0]!==target[0]);
  let dummies = pickN(sameCat, nChoice-1);
  if (dummies.length < nChoice-1)
    dummies = dummies.concat(pickN(WORDS.filter(w=>w[0]!==target[0] && !dummies.includes(w)), nChoice-1-dummies.length));
  const items = shuffle([target].concat(dummies));
  const qSpeak = 'これ なあに?';
  currentSpeak = qSpeak;
  $('qpic').textContent = target[1];
  $('qtext').textContent = 'これ なあに?';
  let correctEl = null;
  items.forEach(w => {
    const b = document.createElement('button');
    b.className='choice';
    b.innerHTML = `<span class="word">${w[0]}</span>`;
    if (w === target) correctEl = b;
    b.addEventListener('click', () => {
      if (State.locked) return;
      if (w === target) onCorrect(b); else onWrong(b, correctEl);
    });
    $('choices').appendChild(b);
  });
  Speech.say(qSpeak);
}

});
